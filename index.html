  <style>
    :root {
      --chocolate:  #2C1206;
      --cacao:      #5C2E14;
      --caramelo:   #A0622A;
      --dorado:     #C9963C;
      --crema:      #FBF5E6;
      --beige:      #EDD9B0;
      --beige2:     #E0C49A;
      --superficie: #FFFCF4;
      --texto:      #1E0E04;
      --texto2:     #6B4530;
      --verde:      #27AE60;
      --rojo:       #C0392B;
      --naranja:    #E67E22;
      --gris:       #7F8C8D;
      --sombra:     0 3px 14px rgba(44,18,6,0.10);
      --sombra2:    0 4px 20px rgba(44,18,6,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      color: var(--texto);
      min-height: 100vh;
    }
    input, select, textarea, button {
      font-family: 'DM Sans', sans-serif;
    }
    /* scrollbar sutil */
    ::-webkit-scrollbar { width: 4px; }
    /* ── utilidades globales ── */
    .card-base {
      background: var(--superficie);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--beige);
      box-shadow: var(--sombra);
    }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    /* modal overlay global */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(44,18,6,0.52);
      z-index: 200;
      display: flex; align-items: flex-end;
    }
    .modal-sheet {
      background: var(--superficie);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 44px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    ::-webkit-scrollbar-track { background: transparent; }

<script type="text/babel">

  const [y, m, d] = f.split('-');
  return `${d}/${m}/${y}`;

  '$' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 0 });

// ESTILOS COMPARTIDOS
// ══════════════════════════════════════════════════════
const S = {
  input: {
    display: 'block', width: '100%', marginTop: 5,
    padding: '11px 13px', borderRadius: 10,
    border: '2px solid var(--beige)',
    background: 'var(--superficie)', color: 'var(--texto)',
    fontSize: 15, outline: 'none', marginBottom: 2,
  },
  label: {
    fontSize: 12, color: 'var(--texto2)', fontWeight: 600,
    display: 'block', marginBottom: 3, marginTop: 12, textTransform: 'uppercase', letterSpacing: '0.5px',
  },
  btnPrimario: {
    background: 'var(--caramelo)', color: 'white',
    border: 'none', borderRadius: 10, padding: '10px 18px',
    fontWeight: 600, fontSize: 14, cursor: 'pointer',
  },
  btnSecundario: {
    background: 'var(--beige)', color: 'var(--cacao)',
    border: 'none', borderRadius: 10, padding: '10px 18px',
    fontWeight: 600, fontSize: 14, cursor: 'pointer',
  },
};

// ══════════════════════════════════════════════════════
// COMPONENTE: CAMPO DE TEXTO
// ══════════════════════════════════════════════════════
function Campo({ label, value, onChange, placeholder, tipo = 'text', rows, children }) {
  return (
    <>
      {label && <label style={S.label}>{label}</label>}
      {rows
        ? <textarea value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder} rows={rows}
            style={{ ...S.input, resize: 'vertical' }} />
        : tipo === 'select'
        ? <select value={value} onChange={e => onChange(e.target.value)} style={S.input}>
            {children}
          </select>
        : <input type={tipo} value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder} style={S.input} />
      }
    </>
  );
}

// ══════════════════════════════════════════════════════
// COMPONENTE: HEADER
// ══════════════════════════════════════════════════════


// ── TEMAS DE COLORES ─────────────────────────────────────────────────
const TEMAS_DG = {
  chocolate: { nombre:'🍫 Chocolate', chocolate:'#2C1206', cacao:'#5C2E14', caramelo:'#A0622A', dorado:'#C9963C', crema:'#FBF5E6', beige:'#EDD9B0', superficie:'#FFFCF4', texto:'#1E0E04', texto2:'#6B4530' },
  rosa:      { nombre:'🌸 Rosa',       chocolate:'#831843', cacao:'#9D174D', caramelo:'#DB2777', dorado:'#F472B6', crema:'#FFF1F8', beige:'#FECDD3', superficie:'#FFF8FB', texto:'#500724', texto2:'#9D174D' },
  violeta:   { nombre:'💜 Violeta',    chocolate:'#3B0764', cacao:'#4C1D95', caramelo:'#7C3AED', dorado:'#A78BFA', crema:'#F5F3FF', beige:'#DDD6FE', superficie:'#FDFCFF', texto:'#1E0B3B', texto2:'#5B21B6' },
  menta:     { nombre:'🌿 Menta',      chocolate:'#064E3B', cacao:'#065F46', caramelo:'#059669', dorado:'#34D399', crema:'#ECFDF5', beige:'#A7F3D0', superficie:'#F0FDF9', texto:'#022C22', texto2:'#065F46' },
  fresa:     { nombre:'🍓 Fresa',      chocolate:'#7F1D1D', cacao:'#991B1B', caramelo:'#DC2626', dorado:'#F87171', crema:'#FEF2F2', beige:'#FECACA', superficie:'#FFF8F8', texto:'#450A0A', texto2:'#991B1B' },
  vainilla:  { nombre:'🍦 Vainilla',   chocolate:'#78350F', cacao:'#92400E', caramelo:'#D97706', dorado:'#FCD34D', crema:'#FFFBEB', beige:'#FDE68A', superficie:'#FFFFFF', texto:'#1C1917', texto2:'#78350F' },
  noche:     { nombre:'🌙 Noche',      chocolate:'#0F172A', cacao:'#1E293B', caramelo:'#6366F1', dorado:'#818CF8', crema:'#F1F5F9', beige:'#334155', superficie:'#1E293B', texto:'#F8FAFC', texto2:'#94A3B8' },
};

function aplicarTema(id) {
  const t = TEMAS_DG[id] || TEMAS_DG.chocolate;
  const r = document.documentElement.style;
  r.setProperty('--chocolate',  t.chocolate);
  r.setProperty('--cacao',      t.cacao);
  r.setProperty('--caramelo',   t.caramelo);
  r.setProperty('--dorado',     t.dorado);
  r.setProperty('--crema',      t.crema);
  r.setProperty('--beige',      t.beige);
  r.setProperty('--beige2',     t.beige);
  r.setProperty('--superficie', t.superficie);
  r.setProperty('--texto',      t.texto);
  r.setProperty('--texto2',     t.texto2);
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', t.chocolate);
  localStorage.setItem('dg_tema', id);
}

// Aplicar tema guardado al cargar
(()=>{ aplicarTema(localStorage.getItem('dg_tema')||'chocolate'); })();

// Nombre del negocio
const getNombreNegocio = () => localStorage.getItem('dg_nombre') || 'Mi Repostería';
const setNombreNegocio = v => localStorage.setItem('dg_nombre', v);

// ── FECHA Y HORA ─────────────────────────────────────────────────────
const ahora = () => new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
const fechaCorta = () => new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});

function Header({ titulo, onBack, onAdd, onLogout, subtitulo }) {
  const [hora, setHora] = useState(ahora());
  const [fecha, setFecha] = useState(fechaCorta());
  useEffect(() => {
    const t = setInterval(() => { setHora(ahora()); setFecha(fechaCorta()); }, 10000);
    return () => clearInterval(t);
  }, []);

  const [nombre] = useState(getNombreNegocio);
  return (
    <header style={{
      background: 'var(--chocolate)', color: 'var(--crema)',
      padding: '10px 16px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      position: 'sticky', top: 0, zIndex: 50,
      boxShadow: '0 2px 12px rgba(44,18,6,0.3)',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
        {onBack && (
          <button onClick={onBack}
            style={{ background: 'none', border: 'none', color: 'var(--crema)', fontSize: 22, cursor: 'pointer', lineHeight: 1, flexShrink: 0 }}>
            ←
          </button>
        )}
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: 'Playfair Display', fontSize: 15, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{nombre}</div>
          <div style={{ fontSize: 11, opacity: 0.7, marginTop: 1 }}>{titulo}{subtitulo ? ' · ' + subtitulo : ''}</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <div style={{ textAlign: 'right', marginRight: 4 }}>
          <div style={{ fontSize: '0.7rem', opacity: 0.7, lineHeight: 1.2 }}>{fecha}</div>
          <div style={{ fontSize: '0.9rem', fontWeight: 700, lineHeight: 1.2 }}>{hora}</div>
        </div>
        {onAdd && (
          <button onClick={onAdd}
            style={{ ...S.btnPrimario, padding: '8px 14px', fontSize: 22, lineHeight: 1, borderRadius: 10 }}>
            +
          </button>
        )}
        {onLogout && (
          <button onClick={onLogout}
            style={{ background: 'none', border: '1px solid rgba(253,245,230,0.25)', color: 'var(--crema)', borderRadius: 8, padding: '6px 10px', fontSize: 12, cursor: 'pointer' }}>
            Salir
          </button>
        )}
      </div>
    </header>
  );
}


// ══════════════════════════════════════════════════════
// PANTALLA: AJUSTES
// ══════════════════════════════════════════════════════
function PantallaAjustes({ onLogout }) {
  const [nombre, setNombreState] = useState(getNombreNegocio());
  const [temaActual, setTemaActual] = useState(()=>localStorage.getItem('dg_tema')||'chocolate');
  const [editando, setEditando] = useState(false);
  const [input, setInput] = useState(nombre);

  const guardarNombre = () => {
    setNombreNegocio(input.trim() || 'Mi Repostería');
    setNombreState(input.trim() || 'Mi Repostería');
    setEditando(false);
  };

  const elegirTema = (id) => {
    aplicarTema(id);
    setTemaActual(id);
  };

  return (
    <div style={{ paddingBottom: 80 }}>
      <Header titulo="⚙️ Ajustes" onLogout={onLogout} />
      <div style={{ padding: '16px' }}>

        {/* Nombre del negocio */}
        <div className="card-base" style={{ marginBottom: 16 }}>
          <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--texto2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 10 }}>Nombre del negocio</p>
          {editando ? (
            <div style={{ display: 'flex', gap: 8 }}>
              <input value={input} onChange={e=>setInput(e.target.value)}
                style={{ flex: 1, padding: '10px 12px', borderRadius: 10, border: '2px solid var(--caramelo)', background: 'var(--superficie)', color: 'var(--texto)', fontSize: 15 }}
                autoFocus onKeyDown={e=>e.key==='Enter'&&guardarNombre()}
              />
              <button onClick={guardarNombre} style={{ padding: '10px 16px', borderRadius: 10, background: 'var(--caramelo)', color: 'white', border: 'none', fontWeight: 700, cursor: 'pointer' }}>✓</button>
              <button onClick={()=>setEditando(false)} style={{ padding: '10px 12px', borderRadius: 10, background: 'var(--beige)', color: 'var(--texto)', border: 'none', cursor: 'pointer' }}>✕</button>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 17, fontWeight: 600, color: 'var(--texto)', fontFamily: 'Playfair Display' }}>{nombre}</span>
              <button onClick={()=>setEditando(true)} style={{ padding: '8px 14px', borderRadius: 10, background: 'var(--beige)', color: 'var(--texto2)', border: 'none', fontSize: 13, cursor: 'pointer', fontWeight: 600 }}>✏️ Editar</button>
            </div>
          )}
        </div>

        {/* Selector de temas */}
        <div className="card-base">
          <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--texto2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Tema de colores</p>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {Object.entries(TEMAS_DG).map(([id, t]) => (
              <button key={id} onClick={()=>elegirTema(id)}
                style={{
                  padding: '12px 10px', borderRadius: 12, cursor: 'pointer', textAlign: 'center',
                  background: t.chocolate, color: t.crema,
                  border: temaActual===id ? `3px solid ${t.dorado}` : '3px solid transparent',
                  fontWeight: temaActual===id ? 700 : 500,
                  fontSize: 13,
                  boxShadow: temaActual===id ? `0 0 0 2px ${t.caramelo}` : 'none',
                  transition: 'all 0.15s',
                }}>
                {t.nombre}
                {temaActual===id && <div style={{ fontSize: 10, marginTop: 2, opacity: 0.8 }}>● Activo</div>}
              </button>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

// PANTALLA: PEDIDOS — lista
// ══════════════════════════════════════════════════════
function PantallaPedidos({ uid }) {
  const [pedidos, setPedidos] = useState([]);
  const [form, setForm]       = useState(null);
  const [cargando, setCarga]  = useState(true);
  const [filtro, setFiltro]   = useState('activos');

  const col = db.collection(`reposteria/${uid}/pedidos`);

  useEffect(() => {
    const unsub = col.orderBy('fechaEntrega', 'asc').onSnapshot(snap => {
      setPedidos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setCarga(false);
    });
    return unsub;
  }, []);

  const guardar = async (datos) => {
    const { id, ...resto } = datos;
    if (id) await col.doc(id).update({ ...resto, updatedAt: new Date() });
    else    await col.add({ ...resto, createdAt: new Date(), updatedAt: new Date() });
    setForm(null);
  };

  const cambiarEstado = async (id, estado) => {
    await col.doc(id).update({ estado, updatedAt: new Date() });
  };

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar este pedido? Esta acción no se puede deshacer.')) return;
    await col.doc(id).delete();
  };

  if (form !== null) {
    return <FormularioPedido inicial={form} onGuardar={guardar} onCancelar={() => setForm(null)} />;
  }

  const activos  = pedidos.filter(p => p.estado !== 'entregado' && p.estado !== 'cancelado');
  const mostrar  = filtro === 'activos' ? activos : pedidos;

  return (
    <div>
      <Header titulo="📋 Pedidos" onAdd={() => setForm({})} onLogout={() => auth.signOut()} subtitulo="Dulce Gestión 🍰" />

      {/* Filtros */}
      <div style={{ padding: '12px 16px 4px', display: 'flex', gap: 8 }}>
        {[
          { k: 'activos', lbl: `Activos (${activos.length})` },
          { k: 'todos',   lbl: `Todos (${pedidos.length})` },
        ].map(f => (
          <button key={f.k} onClick={() => setFiltro(f.k)}
            style={{
              padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
              background: filtro === f.k ? 'var(--caramelo)' : 'var(--beige)',
              color: filtro === f.k ? 'white' : 'var(--cacao)',
              fontWeight: 600, fontSize: 13,
            }}>
            {f.lbl}
          </button>
        ))}
      </div>

      {cargando && <p style={{ textAlign: 'center', padding: 40, color: 'var(--texto2)' }}>Cargando...</p>}

      {!cargando && mostrar.length === 0 && (
        <div style={{ textAlign: 'center', padding: 56 }}>
          <div style={{ fontSize: 52 }}>🎂</div>
          <p style={{ color: 'var(--texto2)', marginTop: 10, marginBottom: 20 }}>
            {filtro === 'activos' ? 'No hay pedidos activos' : 'No hay pedidos todavía'}
          </p>
          <button onClick={() => setForm({})} style={S.btnPrimario}>+ Nuevo pedido</button>
        </div>
      )}

      <div style={{ padding: '8px 16px 110px' }}>
        {mostrar.map(p => (
          <TarjetaPedido key={p.id} pedido={p}
            onEditar={() => setForm(p)}
            onEstado={cambiarEstado}
            onEliminar={eliminar} />
        ))}
      </div>
    </div>
  );
}

// COMPONENTE: TARJETA PEDIDO
// ══════════════════════════════════════════════════════
function TarjetaPedido({ pedido, onEditar, onEstado, onEliminar }) {
  const [abierto, setAbierto] = useState(false);
  const est    = ESTADOS[pedido.estado] || ESTADOS.pendiente;
  const saldo  = (pedido.precio || 0) - (pedido.sena || 0);

  const diasRestantes = () => {
    if (!pedido.fechaEntrega) return null;
    const hoyMs = new Date().setHours(0, 0, 0, 0);
    const entMs = new Date(pedido.fechaEntrega + 'T12:00:00').setHours(0, 0, 0, 0);
    return Math.round((entMs - hoyMs) / 86400000);
  };
  const dias = diasRestantes();
  const urgente = dias !== null && dias <= 2 && pedido.estado === 'pendiente';

  return (
    <div style={{
      background: 'var(--superficie)',
      borderRadius: 14, marginBottom: 12,
      boxShadow: urgente ? '0 4px 16px rgba(230,126,34,0.2)' : 'var(--sombra)',
      border: urgente ? '1px solid #F39C12' : '1px solid var(--beige)',
      overflow: 'hidden',
    }}>
      {/* Cabecera tarjeta */}
      <div onClick={() => setAbierto(!abierto)} style={{ padding: '14px 16px', cursor: 'pointer' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div style={{ flex: 1, marginRight: 10 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--chocolate)' }}>
              {pedido.clienteNombre || 'Sin nombre'}
            </div>
            <div style={{ fontSize: 13, color: 'var(--texto2)', marginTop: 2 }}>
              {pedido.producto || '—'}
            </div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <span style={{
              background: est.bg, color: est.color,
              fontSize: 11, fontWeight: 700, padding: '3px 9px',
              borderRadius: 20, whiteSpace: 'nowrap',
            }}>{est.label}</span>
            {dias !== null && (
              <div style={{
                fontSize: 11, fontWeight: 700, marginTop: 4,
                color: dias < 0 ? 'var(--rojo)' : dias === 0 ? 'var(--naranja)' : 'var(--texto2)',
              }}>
                {dias < 0 ? `⚠️ ${Math.abs(dias)}d vencido` : dias === 0 ? '🌟 ¡Hoy!' : `en ${dias}d`}
              </div>
            )}
          </div>
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 10 }}>
          <span style={{ fontSize: 13, color: 'var(--texto2)' }}>
            📅 {formatFecha(pedido.fechaEntrega)}
          </span>
          <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--caramelo)' }}>
            {formatPeso(pedido.precio)}
          </span>
        </div>
      </div>

      {/* Detalle expandido */}
      {abierto && (
        <div style={{ padding: '0 16px 14px', borderTop: '1px solid var(--beige)' }}>
          {pedido.descripcion && (
            <p style={{ fontSize: 13, color: 'var(--texto2)', margin: '10px 0 6px', fontStyle: 'italic' }}>
              "{pedido.descripcion}"
            </p>
          )}

          <div style={{ display: 'flex', gap: 20, marginTop: 10 }}>
            <div style={{ fontSize: 13 }}>
              <span style={{ color: 'var(--texto2)' }}>Seña: </span>
              <b>{formatPeso(pedido.sena)}</b>
            </div>
            <div style={{ fontSize: 13 }}>
              <span style={{ color: 'var(--texto2)' }}>Saldo: </span>
              <b style={{ color: saldo > 0 ? 'var(--caramelo)' : 'var(--verde)' }}>
                {formatPeso(saldo)}
              </b>
            </div>
          </div>

          {pedido.telefono && (
            <div style={{ fontSize: 13, marginTop: 8 }}>
              📱 <a href={`tel:${pedido.telefono}`} style={{ color: 'var(--caramelo)' }}>{pedido.telefono}</a>
            </div>
          )}

          {/* Botones de acción */}
          <div style={{ display: 'flex', gap: 8, marginTop: 14, flexWrap: 'wrap' }}>
            <button onClick={onEditar}
              style={{ ...S.btnSecundario, fontSize: 13, padding: '7px 12px' }}>
              ✏️ Editar
            </button>
            {pedido.estado === 'pendiente' && (
              <button onClick={() => onEstado(pedido.id, 'listo')}
                style={{ ...S.btnPrimario, fontSize: 13, padding: '7px 12px', background: 'var(--verde)' }}>
                ✓ Listo
              </button>
            )}
            {pedido.estado === 'listo' && (
              <button onClick={() => onEstado(pedido.id, 'entregado')}
                style={{ ...S.btnPrimario, fontSize: 13, padding: '7px 12px', background: 'var(--gris)' }}>
                📦 Entregado
              </button>
            )}
            {pedido.estado === 'listo' && (
              <button onClick={() => onEstado(pedido.id, 'pendiente')}
                style={{ ...S.btnSecundario, fontSize: 13, padding: '7px 12px' }}>
                ↩ Pendiente
              </button>
            )}
            {pedido.estado !== 'cancelado' && pedido.estado !== 'entregado' && (
              <button onClick={() => onEstado(pedido.id, 'cancelado')}
                style={{ ...S.btnPrimario, fontSize: 13, padding: '7px 12px', background: 'var(--rojo)' }}>
                ✕ Cancelar
              </button>
            )}
            <button onClick={() => onEliminar(pedido.id)}
              style={{ ...S.btnSecundario, fontSize: 13, padding: '7px 12px', marginLeft: 'auto', color: 'var(--rojo)' }}>
              🗑️
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// FORMULARIO PEDIDO (nuevo / editar)
// ══════════════════════════════════════════════════════
function FormularioPedido({ inicial, onGuardar, onCancelar }) {
  const [d, setD] = useState({
    clienteNombre: '', telefono: '', producto: '',
    descripcion: '', fechaEntrega: '', precio: '',
    sena: '', estado: 'pendiente',
    ...inicial,
  });
  const set = (k, v) => setD(prev => ({ ...prev, [k]: v }));

  const guardar = () => {
    if (!d.clienteNombre.trim()) return alert('El nombre del cliente es obligatorio');
    if (!d.producto.trim())      return alert('El producto es obligatorio');
    onGuardar({ ...d, precio: Number(d.precio) || 0, sena: Number(d.sena) || 0 });
  };

  return (
    <div>
      <Header titulo={d.id ? '✏️ Editar Pedido' : '+ Nuevo Pedido'} onBack={onCancelar} />
      <div style={{ padding: '16px 16px 110px' }}>

        <Campo label="Cliente *" value={d.clienteNombre} onChange={v => set('clienteNombre', v)} placeholder="Nombre completo" />
        <Campo label="Teléfono" value={d.telefono} onChange={v => set('telefono', v)} placeholder="Ej: 381 123 4567" tipo="tel" />
        <Campo label="Producto *" value={d.producto} onChange={v => set('producto', v)} placeholder="Ej: Torta de cumpleaños 3 pisos" />
        <Campo label="Descripción / Detalles" value={d.descripcion} onChange={v => set('descripcion', v)}
          placeholder="Sabor, relleno, decoración, observaciones..." rows={3} />
        <Campo label="Fecha de entrega" value={d.fechaEntrega} onChange={v => set('fechaEntrega', v)} tipo="date" />
        <Campo label="Precio total ($)" value={d.precio} onChange={v => set('precio', v)} placeholder="0" tipo="number" />
        <Campo label="Seña / Adelanto ($)" value={d.sena} onChange={v => set('sena', v)} placeholder="0" tipo="number" />

        {/* Saldo calculado */}
        {(Number(d.precio) > 0) && (
          <div style={{ background: 'var(--beige)', borderRadius: 10, padding: '10px 14px', marginTop: 4, fontSize: 13 }}>
            <span style={{ color: 'var(--texto2)' }}>Saldo restante: </span>
            <b style={{ color: 'var(--caramelo)' }}>
              {formatPeso(Number(d.precio) - Number(d.sena))}
            </b>
          </div>
        )}

        {/* Estado */}
        <label style={S.label}>Estado</label>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 6 }}>
          {Object.entries(ESTADOS).map(([k, v]) => (
            <button key={k} onClick={() => set('estado', k)}
              style={{
                padding: '8px 14px', borderRadius: 20, cursor: 'pointer',
                border: `2px solid ${d.estado === k ? v.color : 'var(--beige)'}`,
                background: d.estado === k ? v.bg : 'transparent',
                color: d.estado === k ? v.color : 'var(--texto2)',
                fontWeight: 600, fontSize: 13,
              }}>
              {v.label}
            </button>
          ))}
        </div>

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={guardar} style={{ ...S.btnPrimario, flex: 1, padding: 14, fontSize: 15 }}>
            {d.id ? '✓ Guardar cambios' : '+ Crear pedido'}
          </button>
          <button onClick={onCancelar} style={{ ...S.btnSecundario, padding: 14 }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// PANTALLA: STOCK (ingredientes)
// ══════════════════════════════════════════════════════
function PantallaStock({ uid }) {
  const [items, setItems]   = useState([]);
  const [form, setForm]     = useState(null);
  const [buscar, setBuscar] = useState('');

  const col = db.collection(`reposteria/${uid}/stock`);

  useEffect(() => {
    return col.orderBy('nombre', 'asc').onSnapshot(snap => {
      setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }, []);

  const guardar = async (datos) => {
    const { id, ...resto } = datos;
    if (id) await col.doc(id).update(resto);
    else    await col.add(resto);
    setForm(null);
  };

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar este ingrediente?')) return;
    await col.doc(id).delete();
  };

  const ajustar = async (id, delta) => {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const nueva = Math.max(0, (Number(item.cantidad) || 0) + delta);
    await col.doc(id).update({ cantidad: nueva });
  };

  if (form !== null) {
    return <FormularioStock inicial={form} onGuardar={guardar} onCancelar={() => setForm(null)} />;
  }

  const bajos    = items.filter(i => Number(i.cantidad) <= Number(i.stockMinimo || 0));
  const filtrados = items.filter(i => i.nombre.toLowerCase().includes(buscar.toLowerCase()));

  return (
    <div>
      <Header titulo="📦 Stock" onAdd={() => setForm({})} />

      {/* Alerta stock bajo */}
      {bajos.length > 0 && (
        <div style={{ margin: '12px 16px 0', padding: '10px 14px', background: '#FEF3E2', borderRadius: 10, border: '1px solid #F39C12' }}>
          <b style={{ color: 'var(--naranja)', fontSize: 13 }}>⚠️ Stock bajo: </b>
          <span style={{ fontSize: 13, color: 'var(--texto2)' }}>{bajos.map(i => i.nombre).join(', ')}</span>
        </div>
      )}

      {/* Buscador */}
      <div style={{ padding: '10px 16px 4px' }}>
        <input value={buscar} onChange={e => setBuscar(e.target.value)}
          placeholder="🔍 Buscar ingrediente..."
          style={{ ...S.input, marginTop: 0 }} />
      </div>

      {filtrados.length === 0 && items.length === 0 && (
        <div style={{ textAlign: 'center', padding: 56 }}>
          <div style={{ fontSize: 52 }}>🥣</div>
          <p style={{ color: 'var(--texto2)', marginTop: 10, marginBottom: 20 }}>No hay ingredientes cargados</p>
          <button onClick={() => setForm({})} style={S.btnPrimario}>+ Agregar ingrediente</button>
        </div>
      )}

      <div style={{ padding: '4px 16px 110px' }}>
        {filtrados.map(item => {
          const bajo = Number(item.cantidad) <= Number(item.stockMinimo || 0);
          return (
            <div key={item.id} style={{
              background: 'var(--superficie)', borderRadius: 12, marginBottom: 10,
              padding: '14px 16px', boxShadow: 'var(--sombra)',
              border: bajo ? '1px solid #F39C12' : '1px solid var(--beige)',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{item.nombre}</div>
                  <div style={{ fontSize: 12, color: 'var(--texto2)', marginTop: 2 }}>
                    Mínimo: {item.stockMinimo || 0} {item.unidad}
                    {item.costoUnitario > 0 && ` · ${formatPeso(item.costoUnitario)}/${item.unidad}`}
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <button onClick={() => ajustar(item.id, -1)}
                    style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: 'var(--beige)', cursor: 'pointer', fontSize: 18, fontWeight: 700, lineHeight: 1 }}>
                    −
                  </button>
                  <div style={{ textAlign: 'center', minWidth: 56 }}>
                    <div style={{ fontWeight: 700, fontSize: 20 }}>{item.cantidad || 0}</div>
                    <div style={{ fontSize: 10, color: 'var(--texto2)' }}>{item.unidad}</div>
                  </div>
                  <button onClick={() => ajustar(item.id, 1)}
                    style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: 'var(--caramelo)', color: 'white', cursor: 'pointer', fontSize: 18, fontWeight: 700, lineHeight: 1 }}>
                    +
                  </button>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                <button onClick={() => setForm(item)}
                  style={{ ...S.btnSecundario, fontSize: 12, padding: '5px 12px' }}>✏️ Editar</button>
                <button onClick={() => eliminar(item.id)}
                  style={{ ...S.btnSecundario, fontSize: 12, padding: '5px 12px', color: 'var(--rojo)' }}>🗑️</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FormularioStock({ inicial, onGuardar, onCancelar }) {
  const UNIDADES = ['kg', 'g', 'lt', 'ml', 'unidades', 'tazas', 'cdas', 'cditas'];
  const [d, setD] = useState({
    nombre: '', cantidad: 0, unidad: 'kg', stockMinimo: 0, costoUnitario: 0, margen: 50,
    ...inicial,
  });
  const set = (k, v) => setD(prev => ({ ...prev, [k]: v }));

  const guardar = () => {
    if (!d.nombre.trim()) return alert('El nombre es obligatorio');
    onGuardar({
      ...d,
      cantidad:      Number(d.cantidad) || 0,
      stockMinimo:   Number(d.stockMinimo) || 0,
      costoUnitario: Number(d.costoUnitario) || 0,
    });
  };

  return (
    <div>
      <Header titulo={d.id ? '✏️ Editar Ingrediente' : '+ Nuevo Ingrediente'} onBack={onCancelar} />
      <div style={{ padding: '16px 16px 110px' }}>
        <Campo label="Nombre *" value={d.nombre} onChange={v => set('nombre', v)} placeholder="Ej: Harina 0000" />

        <label style={S.label}>Unidad de medida</label>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 4 }}>
          {UNIDADES.map(u => (
            <button key={u} onClick={() => set('unidad', u)}
              style={{
                padding: '7px 12px', borderRadius: 20, border: 'none', cursor: 'pointer',
                background: d.unidad === u ? 'var(--caramelo)' : 'var(--beige)',
                color: d.unidad === u ? 'white' : 'var(--cacao)',
                fontWeight: 600, fontSize: 13,
              }}>
              {u}
            </button>
          ))}
        </div>

        <Campo label={`Cantidad actual (${d.unidad})`} value={d.cantidad} onChange={v => set('cantidad', v)} tipo="number" placeholder="0" />
        <Campo label={`Stock mínimo (${d.unidad}) — alerta`} value={d.stockMinimo} onChange={v => set('stockMinimo', v)} tipo="number" placeholder="0" />
        <Campo label={`Costo por ${d.unidad} ($) — para presupuestos`} value={d.costoUnitario} onChange={v => set('costoUnitario', v)} tipo="number" placeholder="0" />

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={guardar} style={{ ...S.btnPrimario, flex: 1, padding: 14, fontSize: 15 }}>
            {d.id ? '✓ Guardar' : '+ Agregar'}
          </button>
          <button onClick={onCancelar} style={{ ...S.btnSecundario, padding: 14 }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// PANTALLA: CALENDARIO / AGENDA
// ══════════════════════════════════════════════════════
function PantallaCalendario({ uid }) {
  const [pedidos, setPedidos] = useState([]);

  useEffect(() => {
    return db.collection(`reposteria/${uid}/pedidos`)
      .where('estado', 'in', ['pendiente', 'listo'])
      .orderBy('fechaEntrega', 'asc')
      .onSnapshot(snap => {
        setPedidos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
  }, []);

  // Agrupar por fecha
  const porFecha = {};
  pedidos.forEach(p => {
    const f = p.fechaEntrega || '__sin_fecha__';
    if (!porFecha[f]) porFecha[f] = [];
    porFecha[f].push(p);
  });

  const totalHoy = (porFecha[hoy()] || []).reduce((s, p) => s + (p.precio || 0), 0);

  return (
    <div>
      <Header titulo="📅 Agenda de Entregas" />
      <div style={{ padding: '12px 16px 110px' }}>

        {Object.keys(porFecha).length === 0 && (
          <div style={{ textAlign: 'center', padding: 56 }}>
            <div style={{ fontSize: 52 }}>📅</div>
            <p style={{ color: 'var(--texto2)', marginTop: 10 }}>No hay entregas programadas</p>
          </div>
        )}

        {Object.entries(porFecha)
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([fecha, ps]) => {
            const esHoy    = fecha === hoy();
            const esPasada = fecha < hoy() && fecha !== '__sin_fecha__';
            return (
              <div key={fecha} style={{ marginBottom: 20 }}>
                {/* Cabecera de día */}
                <div style={{
                  padding: '8px 14px', borderRadius: 10, marginBottom: 8,
                  background: esHoy ? 'var(--caramelo)' : esPasada ? 'var(--rojo)' : 'var(--chocolate)',
                  color: 'var(--crema)', fontSize: 13, fontWeight: 700,
                  display: 'flex', justifyContent: 'space-between',
                }}>
                  <span>
                    {fecha === '__sin_fecha__' ? '📌 Sin fecha' : formatFecha(fecha)}
                    {esHoy && ' — 🌟 HOY'}
                    {esPasada && ' — ⚠️ VENCIDO'}
                  </span>
                  <span>{ps.length} pedido{ps.length > 1 ? 's' : ''}</span>
                </div>

                {/* Pedidos del día */}
                {ps.map(p => {
                  const est = ESTADOS[p.estado] || ESTADOS.pendiente;
                  return (
                    <div key={p.id} style={{
                      background: 'var(--superficie)', borderRadius: 10, padding: '12px 14px',
                      marginBottom: 8, borderLeft: `4px solid ${est.color}`,
                      boxShadow: 'var(--sombra)',
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 15 }}>{p.clienteNombre}</div>
                          <div style={{ fontSize: 13, color: 'var(--texto2)' }}>{p.producto}</div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <span style={{
                            fontSize: 11, fontWeight: 700, padding: '3px 8px',
                            borderRadius: 20, background: est.bg, color: est.color,
                          }}>{est.label}</span>
                          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--caramelo)', marginTop: 4 }}>
                            {formatPeso(p.precio)}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
      </div>
    </div>
  );
}

// PANTALLA: HISTORIAL

function PantallaHistorial({ uid }) {
  const [pedidos, setPedidos] = useState([]);

  useEffect(() => {
    return db.collection(`reposteria/${uid}/pedidos`)
      .where('estado', '==', 'entregado')
      .orderBy('fechaEntrega', 'desc')
      .onSnapshot(snap => {
        setPedidos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
  }, []);

  const delMes  = pedidos.filter(p => (p.fechaEntrega || '').startsWith(mes));
  const total   = delMes.reduce((s, p) => s + (p.precio || 0), 0);
  const cobrado = delMes.reduce((s, p) => s + (p.precio || 0), 0); // mismo total si todo cobrado

  return (
    <div>
      <Header titulo="🧾 Historial" />
      <div style={{ padding: '12px 16px 110px' }}>

        {/* Selector de mes */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <label style={{ ...S.label, margin: 0 }}>Mes:</label>
          <input type="month" value={mes} onChange={e => setMes(e.target.value)}

        {/* Resumen del mes */}
        <div style={{
          background: 'var(--chocolate)', color: 'var(--crema)',
          borderRadius: 14, padding: 18, marginBottom: 16,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div>
            <div style={{ fontSize: 11, opacity: 0.6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Pedidos entregados</div>
            <div style={{ fontFamily: 'Playfair Display', fontSize: 36, fontWeight: 700, lineHeight: 1.1 }}>{delMes.length}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, opacity: 0.6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Total facturado</div>
            <div style={{ fontFamily: 'Playfair Display', fontSize: 28, fontWeight: 700, color: 'var(--dorado)', lineHeight: 1.1 }}>
              {formatPeso(total)}
            </div>
          </div>
        </div>

        {delMes.length === 0 && (
          <p style={{ textAlign: 'center', color: 'var(--texto2)', padding: 32 }}>
            Sin entregas registradas en este mes
          </p>
        )}

        {delMes.map(p => (
          <div key={p.id} style={{
            background: 'var(--superficie)', borderRadius: 12, padding: '14px 16px',
            marginBottom: 10, boxShadow: 'var(--sombra)', border: '1px solid var(--beige)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{p.clienteNombre}</div>
                <div style={{ fontSize: 13, color: 'var(--texto2)' }}>{p.producto}</div>
                <div style={{ fontSize: 12, color: 'var(--texto2)', marginTop: 4 }}>
                  📅 {formatFecha(p.fechaEntrega)}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontWeight: 700, color: 'var(--caramelo)', fontSize: 16 }}>
                  {formatPeso(p.precio)}
                </div>
                {p.sena > 0 && (
                  <div style={{ fontSize: 12, color: 'var(--texto2)', marginTop: 2 }}>
                    Seña: {formatPeso(p.sena)}
                  </div>
                )}

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// PANTALLA: PRECIOS — lista de productos + calculadora
// ══════════════════════════════════════════════════════
function PantallaPresupuestos({ uid }) {
  const [seccion, setSeccion]   = useState('productos'); // 'productos' | 'calculadora'
  const [productos, setProductos] = useState([]);
  const [stock, setStock]       = useState([]);
  const [formProd, setFormProd] = useState(null);
  const [buscar, setBuscar]     = useState('');

  // Calculadora
  const [lineas, setLineas]     = useState([]);
  const [margen, setMargen]     = useState(40);
  const [nombreCalc, setNombreCalc] = useState('');
  const [ingId, setIngId]       = useState('');
  const [cant, setCant]         = useState('');

  const colProd = db.collection(`reposteria/${uid}/productos`);

  useEffect(() => {
    const u1 = colProd.orderBy('nombre','asc').onSnapshot(snap =>
      setProductos(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
    const u2 = db.collection(`reposteria/${uid}/stock`).orderBy('nombre','asc').onSnapshot(snap =>
      setStock(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
    return () => { u1(); u2(); };
  }, []);

  const guardarProducto = async (datos) => {
    const { id, ...resto } = datos;
    if (id) await colProd.doc(id).update(resto);
    else    await colProd.add(resto);
    setFormProd(null);
  };

  const eliminarProducto = async (id) => {
    if (!confirm('¿Eliminar este producto?')) return;
    await colProd.doc(id).delete();
  };

  // Calculadora
  const agregarLinea = () => {
    if (!ingId || !cant) return alert('Seleccioná un ingrediente y cantidad');
    const item = stock.find(i => i.id === ingId);
    if (!item) return;
    setLineas(prev => [...prev, {
      _id: Date.now(), nombre: item.nombre, unidad: item.unidad,
      cantidad: Number(cant), costoUnitario: Number(item.costoUnitario) || 0,
    }]);
    setIngId(''); setCant('');
  };
  const quitarLinea = (id) => setLineas(prev => prev.filter(l => l._id !== id));
  const costoTotal  = lineas.reduce((s, l) => s + l.cantidad * l.costoUnitario, 0);
  const precioVenta = costoTotal * (1 + margen / 100);
  const ganancia    = precioVenta - costoTotal;

  const CATEGORIAS = ['Tortas', 'Tartas', 'Facturas', 'Bolas de fraile', 'Alfajores', 'Cupcakes', 'Otro'];

  if (formProd !== null) {
    return <FormularioProducto inicial={formProd} onGuardar={guardarProducto} onCancelar={() => setFormProd(null)} categorias={CATEGORIAS} />;
  }

  const filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(buscar.toLowerCase()) ||
    (p.categoria || '').toLowerCase().includes(buscar.toLowerCase())
  );

  // Agrupar por categoría
  const porCategoria = {};
  filtrados.forEach(p => {
    const cat = p.categoria || 'Otro';
    if (!porCategoria[cat]) porCategoria[cat] = [];
    porCategoria[cat].push(p);
  });

  return (
    <div>
      <Header
        titulo="💰 Precios"
        onAdd={seccion === 'productos' ? () => setFormProd({}) : null}
      />

      {/* Selector de sección */}
      <div style={{ padding: '10px 16px 0', display: 'flex', gap: 8 }}>
        {[
          { k: 'productos',    lbl: '📋 Mis Productos' },
          { k: 'calculadora',  lbl: '🧮 Calculadora' },
        ].map(s => (
          <button key={s.k} onClick={() => setSeccion(s.k)}
            style={{
              flex: 1, padding: '9px 10px', borderRadius: 10, border: 'none', cursor: 'pointer',
              background: seccion === s.k ? 'var(--caramelo)' : 'var(--beige)',
              color: seccion === s.k ? 'white' : 'var(--cacao)',
              fontWeight: 700, fontSize: 13,
            }}>
            {s.lbl}
          </button>
        ))}
      </div>

      {/* ─── SECCIÓN PRODUCTOS ─── */}
      {seccion === 'productos' && (
        <div style={{ padding: '10px 16px 110px' }}>

          {/* Buscador */}
          <input value={buscar} onChange={e => setBuscar(e.target.value)}
            placeholder="🔍 Buscar producto..."
            style={{ ...S.input, marginTop: 0, marginBottom: 8 }} />

          {productos.length === 0 && (
            <div style={{ textAlign: 'center', padding: 48 }}>
              <div style={{ fontSize: 52 }}>🎂</div>
              <p style={{ color: 'var(--texto2)', marginTop: 10, marginBottom: 20 }}>
                No hay productos todavía
              </p>
              <button onClick={() => setFormProd({})} style={S.btnPrimario}>+ Agregar producto</button>
            </div>
          )}

          {Object.entries(porCategoria).map(([cat, prods]) => (
            <div key={cat} style={{ marginBottom: 18 }}>
              {/* Cabecera categoría */}
              <div style={{
                background: 'var(--chocolate)', color: 'var(--crema)',
                padding: '7px 14px', borderRadius: 10, marginBottom: 8,
                fontWeight: 700, fontSize: 13, display: 'flex', justifyContent: 'space-between',
              }}>
                <span>{cat}</span>
                <span style={{ opacity: 0.6 }}>{prods.length} producto{prods.length > 1 ? 's' : ''}</span>
              </div>

              {prods.map(p => {
                const ganancia = (p.precioVenta || 0) - (p.precioCosto || 0);
                const margenP  = p.precioCosto > 0 ? Math.round((ganancia / p.precioCosto) * 100) : 0;
                return (
                  <div key={p.id} style={{
                    background: 'var(--superficie)', borderRadius: 12,
                    padding: '13px 14px', marginBottom: 8,
                    border: '1px solid var(--beige)', boxShadow: 'var(--sombra)',
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--chocolate)' }}>
                          {p.nombre}
                        </div>
                        {p.descripcion && (
                          <div style={{ fontSize: 12, color: 'var(--texto2)', marginTop: 2, fontStyle: 'italic' }}>
                            {p.descripcion}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Precios */}
                    <div style={{
                      display: 'flex', gap: 8, marginTop: 10,
                      background: 'var(--crema)', borderRadius: 8, padding: '8px 10px',
                    }}>
                      <div style={{ flex: 1, textAlign: 'center' }}>
                        <div style={{ fontSize: 10, color: 'var(--texto2)', textTransform: 'uppercase', fontWeight: 600 }}>Costo</div>
                        <div style={{ fontWeight: 700, fontSize: 16, color: 'var(--rojo)' }}>
                          {formatPeso(p.precioCosto || 0)}
                        </div>
                      </div>
                      <div style={{ width: 1, background: 'var(--beige2)' }} />
                      <div style={{ flex: 1, textAlign: 'center' }}>
                        <div style={{ fontSize: 10, color: 'var(--texto2)', textTransform: 'uppercase', fontWeight: 600 }}>Ganancia</div>
                        <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--verde)' }}>
                          {margenP}%
                        </div>
                      </div>
                      <div style={{ width: 1, background: 'var(--beige2)' }} />
                      <div style={{ flex: 1, textAlign: 'center' }}>
                        <div style={{ fontSize: 10, color: 'var(--texto2)', textTransform: 'uppercase', fontWeight: 600 }}>Venta</div>
                        <div style={{ fontWeight: 700, fontSize: 16, color: 'var(--caramelo)' }}>
                          {formatPeso(p.precioVenta || 0)}
                        </div>
                      </div>
                    </div>

                    {/* Botones */}
                    <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                      <button onClick={() => setFormProd(p)}
                        style={{ ...S.btnSecundario, fontSize: 12, padding: '6px 12px' }}>
                        ✏️ Editar
                      </button>
                      <button onClick={() => eliminarProducto(p.id)}
                        style={{ ...S.btnSecundario, fontSize: 12, padding: '6px 12px', color: 'var(--rojo)', marginLeft: 'auto' }}>
                        🗑️
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* ─── SECCIÓN CALCULADORA ─── */}
      {seccion === 'calculadora' && (
        <div style={{ padding: '12px 16px 110px' }}>
          <Campo label="¿Qué estás calculando?" value={nombreCalc} onChange={setNombreCalc}
            placeholder="Ej: Torta 3 pisos vainilla y dulce de leche" />

          <div style={{ background: 'var(--superficie)', borderRadius: 14, padding: 14, marginTop: 12, boxShadow: 'var(--sombra)' }}>
            <label style={S.label}>Agregar ingrediente</label>
            <select value={ingId} onChange={e => setIngId(e.target.value)} style={{ ...S.input, marginTop: 4 }}>
              <option value="">— Elegí un ingrediente —</option>
              {stock.map(i => (
                <option key={i.id} value={i.id}>
                  {i.nombre} ({i.unidad}) {i.costoUnitario > 0 ? `· ${formatPeso(i.costoUnitario)}/${i.unidad}` : ''}
                </option>
              ))}
            </select>
            <Campo label="Cantidad a usar" value={cant} onChange={setCant} tipo="number" placeholder="0" />
            <button onClick={agregarLinea} style={{ ...S.btnPrimario, width: '100%', marginTop: 8 }}>
              + Agregar ingrediente
            </button>
          </div>

          {lineas.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <label style={S.label}>Ingredientes</label>
              {lineas.map(l => (
                <div key={l._id} style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',

          )}
        </div>
      )}
    </div>
  );
}

// FORMULARIO PRODUCTO
// ══════════════════════════════════════════════════════
function FormularioProducto({ inicial, onGuardar, onCancelar, categorias }) {
  const [d, setD] = useState({
    nombre: '', categoria: 'Tortas', descripcion: '',
    precioCosto: '', precioVenta: '',
    ...inicial,
  });
  const set = (k, v) => setD(prev => ({ ...prev, [k]: v }));

  const margenCalc = d.precioCosto > 0
    ? Math.round(((Number(d.precioVenta) - Number(d.precioCosto)) / Number(d.precioCosto)) * 100)
    : 0;

  const guardar = () => {
    if (!d.nombre.trim()) return alert('El nombre es obligatorio');
    onGuardar({
      ...d,
      precioCosto: Number(d.precioCosto) || 0,
      precioVenta: Number(d.precioVenta) || 0,
    });
  };

  return (
    <div>
      <Header titulo={d.id ? '✏️ Editar Producto' : '+ Nuevo Producto'} onBack={onCancelar} />
      <div style={{ padding: '16px 16px 110px' }}>

        <Campo label="Nombre del producto *" value={d.nombre} onChange={v => set('nombre', v)} placeholder="Ej: Torta de cumpleaños" />

        <label style={S.label}>Categoría</label>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 4 }}>
          {categorias.map(c => (
            <button key={c} onClick={() => set('categoria', c)}
              style={{
                padding: '7px 12px', borderRadius: 20, border: 'none', cursor: 'pointer',
                background: d.categoria === c ? 'var(--caramelo)' : 'var(--beige)',
                color: d.categoria === c ? 'white' : 'var(--cacao)',
                fontWeight: 600, fontSize: 13,
              }}>
              {c}
            </button>
          ))}
        </div>

        <Campo label="Descripción (opcional)" value={d.descripcion} onChange={v => set('descripcion', v)}
          placeholder="Ej: con relleno de dulce de leche, 3 pisos" rows={2} />

        <Campo label="💸 Precio de costo / fabricación ($)" value={d.precioCosto} onChange={v => set('precioCosto', v)} tipo="number" placeholder="0" />
        <Campo label="💰 Precio de venta final ($)" value={d.precioVenta} onChange={v => set('precioVenta', v)} tipo="number" placeholder="0" />

        {/* Margen calculado */}
        {Number(d.precioCosto) > 0 && Number(d.precioVenta) > 0 && (
          <div style={{
            background: margenCalc >= 0 ? '#E9F7EF' : '#FDEDEC',
            border: `1px solid ${margenCalc >= 0 ? '#27AE60' : '#C0392B'}`,
            borderRadius: 10, padding: '10px 14px', marginTop: 4,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <span style={{ fontSize: 13, color: 'var(--texto2)' }}>Ganancia:</span>
            <div style={{ textAlign: 'right' }}>
              <span style={{ fontWeight: 700, color: margenCalc >= 0 ? 'var(--verde)' : 'var(--rojo)', fontSize: 15 }}>
                {margenCalc}% — {formatPeso(Number(d.precioVenta) - Number(d.precioCosto))}
              </span>
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={guardar} style={{ ...S.btnPrimario, flex: 1, padding: 14, fontSize: 15 }}>
            {d.id ? '✓ Guardar' : '+ Agregar'}
          </button>
          <button onClick={onCancelar} style={{ ...S.btnSecundario, padding: 14 }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ── helpers de costos ──────────────────────────────────
function rcCostoItem(ing, cantidad) {
  if (!ing || !cantidad) return 0;
  switch (ing.unidad) {
    case 'kg':     return (cantidad / 1000) * ing.precio;
    case 'litro':  return (cantidad / 1000) * ing.precio;
    case 'docena': return (cantidad / 12)   * ing.precio;
    case 'unidad': return  cantidad          * ing.precio;
    default:       return 0;
  }
}
function rcFmtQty(ing, cantidad) {
  if (!ing) return '—';
  switch (ing.unidad) {
    case 'kg':     return cantidad >= 1000 ? (cantidad/1000)+'kg' : cantidad+'g';
    case 'litro':  return cantidad >= 1000 ? (cantidad/1000)+'L'  : cantidad+'ml';
    default:       return cantidad+' un.';
  }
}
function rcPeso(n) { return '$\u202F' + Math.round(n).toLocaleString('es-AR'); }
const RC_UNIT_HINT = { kg:'g', litro:'ml', docena:'un', unidad:'un' };

function PantallaRecetas({ uid }) {
  const loadIng = () => { try { return JSON.parse(localStorage.getItem('dg_rc_ing')) || ING_DEFAULT_RC; } catch { return ING_DEFAULT_RC; } };
  const loadRec = () => { try { return JSON.parse(localStorage.getItem('dg_rc_rec')) || REC_DEFAULT_RC; } catch { return REC_DEFAULT_RC; } };

  const [ing, setIngState]   = useState(loadIng);
  React.useEffect(() => {
    if (!uid) return;
    db.collection(`reposteria/${uid}/recetas`).doc('ingredientes').get()
      .then(snap => { if(snap.exists && snap.data().data?.length) { setIngState(snap.data().data); localStorage.setItem('dg_rc_ing', JSON.stringify(snap.data().data)); }})
      .catch(()=>{});
    db.collection(`reposteria/${uid}/recetas`).doc('recetario').get()
      .then(snap => { if(snap.exists && snap.data().data?.length) { setRecState(snap.data().data); localStorage.setItem('dg_rc_rec', JSON.stringify(snap.data().data)); }})
      .catch(()=>{});
  }, [uid]);
  const [rec, setRecState]   = useState(loadRec);
  const [subTab, setSubTab]  = useState('recetas');

    setRecState(v);

    );

    useEffect(() => {
      return db.collection(`reposteria/${uid}/stock`).orderBy('nombre','asc')
        .onSnapshot(snap => setStockFb(snap.docs.map(d=>({id:d.id,...d.data()}))));
    }, []);

    const getQty = (nombre) => {
      const s = stockFb.find(s => s.nombre.toLowerCase().trim() === nombre.toLowerCase().trim());
      return s ? Number(s.cantidad)||0 : null;
    };

    const ajustarQty = async (nombre, delta) => {
      const s = stockFb.find(s => s.nombre.toLowerCase().trim() === nombre.toLowerCase().trim());
      if (s) {
        const nueva = Math.max(0, (Number(s.cantidad)||0) + delta);
        await db.collection(`reposteria/${uid}/stock`).doc(s.id).update({ cantidad: nueva });

        // Crear en Firestore si no existe
        const ing = ing.find(i=>i.nombre===nombre);

          nombre, cantidad: Math.max(0, delta),
          unidad: ing?.unidad||'kg', stockMinimo: 0, costoUnitario: 0

                      <span style={{ fontSize:14, fontWeight:700, color: sinStock ? 'var(--rojo)' : 'var(--verde)', minWidth:24, textAlign:'center' }}>{qty??0}</span>
                      <button onClick={() => ajustarQty(item.nombre, +1)} style={{ width:22, height:22, borderRadius:'50%', border:'1px solid var(--beige2)', background:'none', cursor:'pointer', color:'var(--texto)', fontSize:13 }}>+</button>
                      <span style={{ fontSize:12, color:'var(--texto2)' }}>{item.unidad}</span>
                    </div>
                  </div>

                  {/* Precio costo y venta */}
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
                    <span style={{ fontSize:12, color:'var(--texto2)' }}>Costo: <b style={{color:'var(--texto)'}}>{rcPeso(item.precio||0)}</b> {unitLabel}</span>
                    <span style={{ fontSize:11, color:'var(--texto2)' }}>·</span>
                    {editandoEste ? (
                      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
                        <span style={{ fontSize:12, color:'var(--texto2)' }}>Venta: $</span>
                        <input type="number" defaultValue={pVenta} id={`pv_${item.id}`}
                          style={{ width:80, padding:'3px 6px', borderRadius:6, border:'1px solid var(--caramelo)', fontSize:13, background:'var(--superficie)', color:'var(--texto)' }}
                          onKeyDown={e => e.key==='Enter' && guardarPrecioVenta(item.id, document.getElementById(`pv_${item.id}`).value)}
                        />
                        <button onClick={() => guardarPrecioVenta(item.id, document.getElementById(`pv_${item.id}`).value)}
                          style={{ background:'var(--verde)', color:'white', border:'none', borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✓</button>
                        <button onClick={() => setEditPrecio(null)}
                          style={{ background:'none', border:'1px solid var(--beige2)', borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:12, color:'var(--texto2)' }}>✕</button>
                      </div>
                    ) : (
                      <span style={{ fontSize:12, color:'var(--verde)', fontWeight:600, cursor:'pointer' }} onClick={() => setEditPrecio({id:item.id})}>
                        Venta: {rcPeso(pVenta)} {item.margen>0 && !item.precioVenta ? `(+${item.margen}%)` : item.precioVenta ? '✏️' : ''} ✏️
                      </span>
                    )}
                  </div>
                </div>

                <div style={{ display:'flex', flexDirection:'column', gap:5, flexShrink:0 }}>
                  <button onClick={() => setModIngr(item)} style={{ ...S.btnSecundario, padding:'5px 10px', fontSize:12 }}>✏️</button>
                  <button onClick={() => { if(!confirm('¿Eliminar?')) return; saveIng(ing.filter(i=>i.id!==item.id)); }}
                    style={{ ...S.btnSecundario, padding:'5px 10px', fontSize:12, color:'var(--rojo)' }}>🗑</button>
                </div>
              </div>
            </div>
          );
        })}
        <button onClick={() => setModIngr({})} style={{ ...S.btnPrimario, width:'100%', padding:13, marginTop:6 }}>+ Nuevo ingrediente</button>
      </div>
    );
  };

  // ── RECETAS TAB ───────────────────────────────────
  const TabRecetas = () => (
    <div style={{ padding:'12px 16px 120px' }}>
      {rec.length === 0 && (
        <div style={{ textAlign:'center', padding:'50px 20px', color:'var(--texto2)' }}>
          <div style={{ fontSize:48 }}>📖</div>
          <p style={{ marginTop:10 }}>No hay recetas todavía.<br/>Tocá <b>+</b> para agregar.</p>
        </div>
      )}
      {rec.map(r => {
        const ct = costoRec(r);
        return (
          <div key={r.id} style={{ background:'var(--superficie)', borderRadius:14, padding:'16px', marginBottom:12, border:'1px solid var(--beige)', boxShadow:'var(--sombra)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
              <div>
                <div style={{ fontSize:32, marginBottom:4 }}>{r.emoji}</div>
                <div style={{ fontWeight:700, fontSize:16, color:'var(--chocolate)', lineHeight:1.25 }}>{r.nombre}</div>
                <div style={{ fontSize:12, color:'var(--texto2)', marginTop:3 }}>{r.descripcion}</div>
                <div style={{ fontSize:11, color:'var(--texto2)', marginTop:2 }}>📦 {r.rinde}</div>
              </div>
              <div style={{ textAlign:'right', flexShrink:0, marginLeft:8 }}>
                <div style={{ fontSize:10, color:'var(--texto2)', marginBottom:2, textTransform:'uppercase', letterSpacing:'.5px' }}>Costo mat.</div>
                <div style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--caramelo)', fontWeight:700 }}>{rcPeso(ct)}</div>
              </div>
            </div>
            <div style={{ display:'flex', gap:7, flexWrap:'wrap' }}>
              <button onClick={() => setVerRec(r)}
                style={{ ...S.btnPrimario, fontSize:12, padding:'7px 11px' }}>👁 Detalle</button>
              <button onClick={() => { setCalcId(r.id); setSubTab('calcular'); }}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px', color:'var(--verde)', background:'#EAF7ED' }}>🧮 Calcular</button>
              <button onClick={() => setModRec(r)}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px' }}>✏️ Editar</button>
              <button onClick={() => { if (!confirm('¿Eliminar esta receta?')) return; saveRec(rec.filter(x => x.id !== r.id)); }}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px', color:'var(--rojo)' }}>🗑</button>
            </div>
          </div>
        );
      })}
      <button onClick={() => setModRec({})}
        style={{ ...S.btnPrimario, width:'100%', padding:13, marginTop:6 }}>+ Nueva receta</button>
    </div>
  );

  // ── CALCULADORA TAB ───────────────────────────────
  const TabCalcular = () => {
    const recSel = rec.find(r => r.id === calcId);
    const items  = recSel ? recSel.ingredientes.map(ir => {
      const g = getIng(ir.ingId);
      return { nombre: g ? g.nombre : '❓ Borrado', qty: rcFmtQty(g, ir.cantidad), c1: rcCostoItem(g, ir.cantidad) };
    }) : [];
    const costoBase = items.reduce((s, i) => s + i.c1, 0);
    const costoProd = costoBase * calcN;
    const precioUnit= costoBase * (1 + margen / 100);
    const precioTot = precioUnit * calcN;
    const ganancia  = precioTot - costoProd;

    return (
      <div style={{ padding:'12px 16px 120px' }}>
        <div style={{ background:'var(--superficie)', borderRadius:14, padding:16, marginBottom:12, boxShadow:'var(--sombra)', border:'1px solid var(--beige)' }}>
          <Campo label="Receta" value={calcId||''} onChange={v => setCalcId(v||null)} tipo="select">
            <option value="">— Elegí una receta —</option>
            {rec.map(r => <option key={r.id} value={r.id}>{r.emoji} {r.nombre}</option>)}
          </Campo>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Campo label="Cantidad a producir" value={calcN} onChange={v => setCalcN(Math.max(1,Number(v)||1))} tipo="number" placeholder="1" />
            <Campo label="Margen ganancia %" value={margen} onChange={v => setMargen(Math.max(0,Number(v)||0))} tipo="number" placeholder="150" />
          </div>
          <div style={{ fontSize:11, color:'var(--texto2)', textAlign:'center', marginTop:-4 }}>
            Margen recomendado: 150% (vendés 2.5× el costo)
          </div>
        </div>

        {!recSel && (
          <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--texto2)' }}>
            <div style={{ fontSize:48 }}>🧮</div>
            <p style={{ marginTop:10 }}>Seleccioná una receta<br/>para ver el desglose de costos.</p>
          </div>
        )}

        {recSel && (
          <>
            <div style={{ background:'var(--superficie)', borderRadius:14, padding:16, marginBottom:12, border:'1px solid var(--beige)', boxShadow:'var(--sombra)' }}>
              <div style={{ fontWeight:700, fontSize:15, color:'var(--chocolate)', marginBottom:12 }}>
                {recSel.emoji} {recSel.nombre} × {calcN}
              </div>
              {items.map((it, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom: i < items.length-1 ? '1px solid var(--beige)' : 'none', fontSize:13, gap:6 }}>
                  <span style={{ flex:1, fontWeight:500 }}>{it.nombre}</span>
                  <span style={{ color:'var(--texto2)', fontSize:12, minWidth:50, textAlign:'right' }}>{it.qty}</span>
                  <span style={{ color:'var(--caramelo)', fontWeight:700, minWidth:72, textAlign:'right' }}>{rcPeso(it.c1 * calcN)}</span>
                </div>
              ))}
            </div>

            <div style={{ background:'var(--chocolate)', color:'var(--crema)', borderRadius:14, padding:18 }}>
              {[
                ['Costo materia prima (×'+calcN+')', rcPeso(costoProd), null],
                ['Costo por unidad/porción', rcPeso(costoBase), null],
                ['Margen de ganancia', margen+'%', 'var(--dorado)'],
              ].map(([lbl, val, col], i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'7px 0', fontSize:14, borderBottom:'1px solid rgba(253,245,230,0.1)' }}>
                  <span style={{ opacity:.8 }}>{lbl}</span>
                  <span style={{ fontWeight:700, color: col||'inherit' }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:16, paddingTop:14, borderTop:'1px solid rgba(253,245,230,0.2)' }}>
                <div style={{ fontSize:10, opacity:.6, textTransform:'uppercase', letterSpacing:'.7px', marginBottom:4 }}>
                  Precio de venta sugerido por unidad
                </div>
                <div style={{ fontFamily:'Playfair Display', fontSize:32, color:'var(--dorado)', fontWeight:700 }}>{rcPeso(precioUnit)}</div>
                <div style={{ fontSize:11, opacity:.55, marginTop:4 }}>Rinde: {recSel.rinde}</div>
              </div>
              <div style={{ marginTop:14, paddingTop:12, borderTop:'1px solid rgba(253,245,230,0.15)' }}>
                {[
                  ['Venta total ('+calcN+' unid.)', rcPeso(precioTot), null],
                  ['🎉 Ganancia neta', rcPeso(ganancia), '#5DADE2'],
                ].map(([lbl,val,col],i) => (
                  <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0', fontSize:14 }}>
                    <span>{lbl}</span>
                    <span style={{ fontWeight:700, color: col||'inherit' }}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:'var(--beige)', borderRadius:10, padding:'11px 14px', fontSize:12, color:'var(--texto2)', marginTop:10, lineHeight:1.5 }}>
              ⚠️ <b>Importante:</b> estos son costos de materia prima solamente. Para el precio real también considerá: gas, mano de obra, packaging y gastos fijos.
            </div>
          </>
        )}
      </div>
    );
  };

  // ── MODAL INGREDIENTE ─────────────────────────────
  const ModalIngr = () => {
    const isEdit = !!(modIngr && modIngr.id);
    const [nombre, setNombre] = useState(modIngr ? modIngr.nombre||'' : '');
    const [unidad, setUnidad] = useState(modIngr ? modIngr.unidad||'kg' : 'kg');
    const [precio,    setPrecio]    = useState(modIngr ? modIngr.precio||'' : '');
    const [margenIng, setMargenIng] = useState(modIngr ? modIngr.margen||50 : 50);

    const guardar = () => {
      if (!nombre.trim()) return alert('Escribí el nombre del ingrediente');
      const datos = { nombre: nombre.trim(), unidad, precio: parseFloat(precio)||0 };
      if (isEdit) saveIng(ing.map(i => i.id === modIngr.id ? {...i,...datos} : i));
      else        saveIng([...ing, { id: uid2(), ...datos }]);
      setModIngr(null);
    };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setModIngr(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'85vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--chocolate)', marginBottom:16 }}>
            {isEdit ? '✏️ Editar' : '🧂 Nuevo'} Ingrediente
          </h2>
          <Campo label="Nombre del ingrediente" value={nombre} onChange={setNombre} placeholder="Ej: Harina 0000" />
          <label style={S.label}>Unidad de compra</label>
          <select value={unidad} onChange={e => setUnidad(e.target.value)} style={{ ...S.input, marginBottom:14 }}>
            <option value="kg">Kilogramo — precio por kg</option>
            <option value="litro">Litro — precio por litro</option>
            <option value="docena">Docena — precio por 12 unidades</option>
            <option value="unidad">Unidad — precio por unidad</option>
          </select>
          <Campo label={`Precio de costo por ${unidad} ($)`} value={precio} onChange={setPrecio} tipo="number" placeholder="0" />
          <Campo label="Margen de ganancia deseado (%)" value={margenIng} onChange={setMargenIng} tipo="number" placeholder="50" />
          {precio > 0 && margenIng > 0 && (
            <div style={{ fontSize:12, color:'var(--verde)', marginBottom:10, background:'rgba(39,174,96,0.08)', borderRadius:8, padding:'8px 12px', fontWeight:600 }}>
              💰 Precio de venta sugerido: ${Math.round(precio*(1+margenIng/100)).toLocaleString('es-AR')} por {unidad}
            </div>
          )}
          <div style={{ fontSize:11, color:'var(--texto2)', marginBottom:14, background:'var(--beige)', borderRadius:8, padding:'8px 12px' }}>
            💡 En recetas: kg→gramos, litro→ml, docena/unidad→unidades
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <button onClick={() => setModIngr(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cancelar</button>
            <button onClick={guardar} style={{ ...S.btnPrimario, flex:2, padding:13 }}>💾 Guardar</button>
          </div>
        </div>
      </div>
    );
  };

  // ── MODAL VER RECETA ──────────────────────────────
  const ModalVerRec = () => {
    const r = verRec;
    if (!r) return null;
    const ct = costoRec(r);
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setVerRec(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'90vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--chocolate)', marginBottom:4 }}>{r.emoji} {r.nombre}</h2>
          <p style={{ fontSize:13, color:'var(--texto2)', marginBottom:4 }}>{r.descripcion}</p>
          <p style={{ fontSize:12, color:'var(--texto2)', marginBottom:14 }}>📦 {r.rinde}</p>
          {(r.ingredientes||[]).map((ir, i) => {
            const g  = getIng(ir.ingId);
            const c1 = rcCostoItem(g, ir.cantidad);
            return (
              <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--beige)', fontSize:13, gap:6 }}>
                <span style={{ flex:1, fontWeight:500 }}>{g ? g.nombre : '❓ Borrado'}</span>
                <span style={{ color:'var(--texto2)', fontSize:12 }}>{rcFmtQty(g, ir.cantidad)}</span>
                <span style={{ color:'var(--caramelo)', fontWeight:700 }}>{rcPeso(c1)}</span>
              </div>
            );
          })}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:16, padding:'14px 16px', background:'var(--chocolate)', borderRadius:12, color:'var(--crema)' }}>
            <span style={{ fontSize:14, opacity:.8 }}>Costo total materia prima</span>
            <span style={{ fontFamily:'Playfair Display', fontSize:22, color:'var(--dorado)', fontWeight:700 }}>{rcPeso(ct)}</span>
          </div>
          <div style={{ display:'flex', gap:10, marginTop:14 }}>
            <button onClick={() => setVerRec(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cerrar</button>
            <button onClick={() => { setCalcId(r.id); setSubTab('calcular'); setVerRec(null); }}
              style={{ ...S.btnPrimario, flex:2, padding:13, background:'var(--verde)' }}>🧮 Ir a Calcular</button>
          </div>
        </div>
      </div>
    );
  };

  // ── MODAL EDITAR RECETA ───────────────────────────
  const ModalEditRec = () => {
    const isEdit = !!(modRec && modRec.id);
    const [nombre, setNombre]   = useState(modRec ? modRec.nombre||'' : '');
    const [emoji, setEmoji]     = useState(modRec ? modRec.emoji||'🍰' : '🍰');
    const [desc, setDesc]       = useState(modRec ? modRec.descripcion||'' : '');
    const [rinde, setRinde]     = useState(modRec ? modRec.rinde||'' : '');
    const [checks, setChecks]   = useState(() => {
      const m = {};
      (modRec && modRec.ingredientes || []).forEach(ir => { m[ir.ingId] = ir.cantidad; });
      return m;
    });

    const toggleIng = (id) => setChecks(prev => {
      const next = {...prev};
      if (next[id] !== undefined) delete next[id];
      else next[id] = '';
      return next;
    });
    const setQty = (id, v) => setChecks(prev => ({...prev, [id]: v}));

    const guardar = () => {
      if (!nombre.trim()) return alert('Escribí el nombre de la receta');
      const ingredientes = Object.entries(checks)
        .filter(([,v]) => v !== undefined)
        .map(([ingId, cantidad]) => ({ ingId, cantidad: parseFloat(cantidad)||0 }));
      const datos = { nombre: nombre.trim(), emoji: emoji||'🍰', descripcion: desc, rinde, ingredientes };
      if (isEdit) saveRec(rec.map(r => r.id === modRec.id ? {...r,...datos} : r));
      else        saveRec([...rec, { id: uid2(), ...datos }]);
      setModRec(null);
    };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setModRec(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'92vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--chocolate)', marginBottom:16 }}>
            {isEdit ? '✏️ Editar' : '📖 Nueva'} Receta
          </h2>
          <div style={{ display:'grid', gridTemplateColumns:'64px 1fr', gap:10 }}>
            <Campo label="Emoji" value={emoji} onChange={setEmoji} placeholder="🍰" />
            <Campo label="Nombre de la receta" value={nombre} onChange={setNombre} placeholder="Ej: Torta de vainilla" />
          </div>
          <Campo label="Descripción corta" value={desc} onChange={setDesc} placeholder="Ej: Con ganache de chocolate" />
          <Campo label="¿Cuánto rinde?" value={rinde} onChange={setRinde} placeholder="Ej: 12 unidades / 8 porciones" />
          <label style={S.label}>✅ Ingredientes y cantidades</label>
          <div style={{ maxHeight:'32vh', overflowY:'auto', border:'1.5px solid var(--beige)', borderRadius:10, padding:'4px 12px', marginBottom:6 }}>
            {ing.map(item => {
              const sel = checks[item.id] !== undefined;
              const hint= RC_UNIT_HINT[item.unidad]||'';
              return (
                <div key={item.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 0', borderBottom:'1px solid var(--beige)' }}>
                  <input type="checkbox" checked={sel} onChange={() => toggleIng(item.id)}
                    style={{ width:18, height:18, accentColor:'var(--caramelo)', flexShrink:0 }} />
                  <label onClick={() => toggleIng(item.id)} style={{ flex:1, fontSize:13, cursor:'pointer' }}>{item.nombre}</label>
                  <input type="number" min="0" value={sel ? (checks[item.id]||'') : ''} disabled={!sel}
                    onChange={e => setQty(item.id, e.target.value)} placeholder="0"
                    style={{ width:70, padding:'5px 8px', border:'1.5px solid var(--beige)', borderRadius:8, fontSize:13, textAlign:'center', background:'var(--crema)', opacity: sel?1:.35 }} />
                  <span style={{ fontSize:11, color:'var(--texto2)', width:22 }}>{hint}</span>
                </div>
              );
            })}
          </div>
          <div style={{ display:'flex', gap:10, marginTop:14 }}>
            <button onClick={() => setModRec(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cancelar</button>
            <button onClick={guardar} style={{ ...S.btnPrimario, flex:2, padding:13 }}>💾 Guardar receta</button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <Header titulo="🍰 Recetas" onAdd={() => subTab==='stock' ? setModIngr({}) : setModRec({})} />
      <SubTab />
      {subTab === 'recetas' && <TabRecetas />}
      {subTab === 'stock'   && <TabStock />}
      {modIngr !== null && <ModalIngr />}
      {verRec   !== null && <ModalVerRec />}
      {modRec   !== null && <ModalEditRec />}
    </div>
  );
}
