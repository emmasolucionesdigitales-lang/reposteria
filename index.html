// PANTALLA: CAJA
// Ingresos · Egresos · Señas · Saldos · Gastos · Movimientos manuales
// Total de caja + desglose por forma de pago
// ══════════════════════════════════════════════════════════════════════
const CAT_CAJA = {
  sena:   { label: 'Seña',          tipo: 'ingreso', icon: '💵' },
  saldo:  { label: 'Saldo',         tipo: 'ingreso', icon: '💰' },
  venta:  { label: 'Venta',         tipo: 'ingreso', icon: '🛒' },
  ingreso:{ label: 'Otro ingreso',  tipo: 'ingreso', icon: '➕' },
  gasto:  { label: 'Gasto/Insumo',  tipo: 'egreso',  icon: '🧾' },
  retiro: { label: 'Retiro',        tipo: 'egreso',  icon: '➖' },
};
const PAGOS_CAJA = [
  ['efectivo',      '💵 Efectivo'],
  ['transferencia', '📱 Transfer.'],
  ['debito',        '💳 Débito'],
  ['credito',       '💳 Crédito'],
];

function PantallaCaja({ uid }) {
  const [movs, setMovs]       = useState([]);
  const [pedidos, setPedidos] = useState([]);
  const [form, setForm]       = useState(null);
  const [periodo, setPeriodo] = useState('hoy');
  const [cargando, setCarga]  = useState(true);

  const col = db.collection(`reposteria/${uid}/caja`);

  useEffect(() => {
    const u = col.orderBy('fecha', 'desc').limit(300).onSnapshot(snap => {
      setMovs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setCarga(false);
    });
    // Traer pedidos para poder vincular señas/saldos
    db.collection(`reposteria/${uid}/pedidos`).get()
      .then(s => setPedidos(s.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.clienteNombre)))
      .catch(() => {});
    return u;
  }, [uid]);

  const guardar = async (datos) => {
    const { id, ...resto } = datos;
    if (id) await col.doc(id).update({ ...resto, updatedAt: new Date() });
    else    await col.add({ ...resto, createdAt: new Date() });
    setForm(null);
  };

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar este movimiento de la caja?')) return;
    await col.doc(id).delete();
  };

  // ── Filtrar por período ──
  const hoyStr     = new Date().toISOString().slice(0, 10);
  const semanaStr  = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
  const mesStr     = hoyStr.slice(0, 7);
  const enPeriodo = (m) => {
    if (periodo === 'hoy')    return m.fecha === hoyStr;
    if (periodo === 'semana') return m.fecha >= semanaStr;
    if (periodo === 'mes')    return (m.fecha || '').slice(0, 7) === mesStr;
    return true;
  };
  const movsFiltrados = movs.filter(enPeriodo);

  // ── Totales ──
  const ingresos = movsFiltrados.filter(m => m.tipo === 'ingreso').reduce((s, m) => s + (Number(m.monto) || 0), 0);
  const egresos  = movsFiltrados.filter(m => m.tipo === 'egreso').reduce((s, m) => s + (Number(m.monto) || 0), 0);
  const neto     = ingresos - egresos;

  // ── Desglose por forma de pago (neto: ingresos - egresos) ──
  const porPago = { efectivo: 0, transferencia: 0, debito: 0, credito: 0 };
  movsFiltrados.forEach(m => {
    const fp = m.formaPago || 'efectivo';
    const signo = m.tipo === 'egreso' ? -1 : 1;
    porPago[fp] = (porPago[fp] || 0) + signo * (Number(m.monto) || 0);
  });

  if (form !== null) {
    return <FormularioMovimiento inicial={form} pedidos={pedidos} onGuardar={guardar} onCancelar={() => setForm(null)} />;
  }

  const PERIODOS = [['hoy', 'Hoy'], ['semana', '7 días'], ['mes', 'Mes'], ['todos', 'Todos']];

  return (
    <div style={{ paddingBottom: 80 }}>
      {/* Botón nuevo movimiento */}
      <div style={{ padding: '12px 16px 0' }}>
        <button onClick={() => setForm({})} style={{ ...S.btnPrimario, width: '100%', padding: '11px', borderRadius: 12, fontSize: 14 }}>+ Nuevo movimiento</button>
      </div>

      {/* Selector período */}
      <div style={{ display: 'flex', background: 'var(--beige)', borderRadius: 12, margin: '10px 16px 0', padding: 4, gap: 4 }}>
        {PERIODOS.map(([k, l]) => (
          <button key={k} onClick={() => setPeriodo(k)} style={{
            flex: 1, border: 'none', cursor: 'pointer', borderRadius: 9, padding: '8px 4px',
            background: periodo === k ? 'var(--chocolate)' : 'transparent',
            color: periodo === k ? 'var(--barTxt)' : 'var(--texto2)',
            fontWeight: periodo === k ? 700 : 500, fontSize: 13, transition: 'all .15s',
          }}>{l}</button>
        ))}
      </div>

      {cargando && <p style={{ textAlign: 'center', padding: 40, color: 'var(--texto2)' }}>Cargando...</p>}

      {!cargando && (
        <div style={{ padding: '12px 16px' }}>

          {/* ── Total de caja ── */}
          <div style={{
            background: neto >= 0 ? 'var(--chocolate)' : 'var(--rojo)',
            borderRadius: 16, padding: '18px 20px', marginBottom: 14, color: 'var(--barTxt)',
            boxShadow: 'var(--sombra2)',
          }}>
            <div style={{ fontSize: 12, opacity: 0.8, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>
              Total en caja {periodo !== 'todos' ? `(${PERIODOS.find(p => p[0] === periodo)[1].toLowerCase()})` : ''}
            </div>
            <div style={{ fontFamily: 'Playfair Display', fontSize: 34, fontWeight: 700 }}>{formatPeso(neto)}</div>
            <div style={{ display: 'flex', gap: 16, marginTop: 8, fontSize: 13 }}>
              <span>↗️ Ingresos: <b>{formatPeso(ingresos)}</b></span>
              <span>↘️ Egresos: <b>{formatPeso(egresos)}</b></span>
            </div>
          </div>

          {/* ── Desglose por forma de pago ── */}
          <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--texto2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Desglose por forma de pago</p>
          <div style={{ background: 'var(--superficie)', border: '1px solid var(--beige)', borderRadius: 12, overflow: 'hidden', marginBottom: 16 }}>
            {PAGOS_CAJA.map(([k, l], idx) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', borderBottom: idx < PAGOS_CAJA.length - 1 ? '1px solid var(--beige)' : 'none' }}>
                <span style={{ fontSize: 13, color: 'var(--texto)' }}>{l}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: porPago[k] < 0 ? 'var(--rojo)' : 'var(--chocolate)' }}>{formatPeso(porPago[k])}</span>
              </div>
            ))}
          </div>

          {/* ── Lista de movimientos ── */}
          <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--texto2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>
            Movimientos ({movsFiltrados.length})
          </p>

          {movsFiltrados.length === 0 && (
            <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--texto2)' }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>🪙</div>
              <p>Sin movimientos en este período</p>
              <button onClick={() => setForm({})} style={{ ...S.btnPrimario, marginTop: 14 }}>+ Cargar movimiento</button>
            </div>
          )}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {movsFiltrados.map(m => {
              const cat = CAT_CAJA[m.categoria] || CAT_CAJA.ingreso;
              const esEgreso = m.tipo === 'egreso';
              const pagoLbl = (PAGOS_CAJA.find(p => p[0] === m.formaPago) || ['', m.formaPago])[1];
              return (
                <div key={m.id} style={{ background: 'var(--superficie)', border: '1px solid var(--beige)', borderRadius: 12, padding: '11px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ fontSize: 22, flexShrink: 0 }}>{cat.icon}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--texto)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {m.concepto || cat.label}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--texto2)', marginTop: 2 }}>
                      {cat.label} · {pagoLbl} · {formatFecha(m.fecha)}
                    </div>
                  </div>
                  <div style={{ textAlign: 'right', flexShrink: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: esEgreso ? 'var(--rojo)' : 'var(--verde)' }}>
                      {esEgreso ? '−' : '+'}{formatPeso(m.monto)}
                    </div>
                    <button onClick={() => eliminar(m.id)} style={{ background: 'none', border: 'none', color: 'var(--texto2)', cursor: 'pointer', fontSize: 13, marginTop: 2 }}>🗑</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── FORMULARIO: NUEVO MOVIMIENTO DE CAJA ──
function FormularioMovimiento({ inicial, pedidos, onGuardar, onCancelar }) {
  const [m, setM] = useState({
    categoria: 'sena', concepto: '', monto: '',
    formaPago: 'efectivo', fecha: new Date().toISOString().slice(0, 10),
    pedidoId: '', ...inicial,
  });
  const set = (k, v) => setM(prev => ({ ...prev, [k]: v }));
  const cat = CAT_CAJA[m.categoria] || CAT_CAJA.ingreso;

  // Al elegir un pedido, autocompletar concepto
  const elegirPedido = (pedidoId) => {
    set('pedidoId', pedidoId);
    if (!pedidoId) return;
    const p = pedidos.find(x => x.id === pedidoId);
    if (p) {
      const etiqueta = m.categoria === 'saldo' ? 'Saldo' : 'Seña';
      set('concepto', `${etiqueta} — ${p.clienteNombre}${p.producto ? ' (' + p.producto + ')' : ''}`);
      // Sugerir monto: seña pendiente o saldo restante
      if (m.categoria === 'saldo') {
        const saldo = (Number(p.precio) || 0) - (Number(p.sena) || 0);
        if (saldo > 0 && !m.monto) set('monto', String(saldo));
      } else if (m.categoria === 'sena' && p.sena && !m.monto) {
        set('monto', String(p.sena));
      }
    }
  };

  const guardar = () => {
    if (!(Number(m.monto) > 0)) return alert('Ingresá un monto mayor a 0');
    const datos = {
      ...m,
      tipo: cat.tipo,
      monto: Number(m.monto) || 0,
      concepto: (m.concepto || '').trim() || cat.label,
      hora: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
    };
    onGuardar(datos);
  };

  const vinculable = m.categoria === 'sena' || m.categoria === 'saldo';

  return (
    <div>
      <Header titulo={m.id ? '✏️ Editar movimiento' : '+ Nuevo movimiento'} onBack={onCancelar} />
      <div style={{ padding: '16px 16px 110px' }}>

        {/* Categoría */}
        <label style={S.label}>Tipo de movimiento</label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 12 }}>
          {Object.entries(CAT_CAJA).map(([k, v]) => (
            <button key={k} onClick={() => set('categoria', k)} style={{
              padding: '10px 4px', borderRadius: 10, cursor: 'pointer',
              border: m.categoria === k ? '2px solid var(--caramelo)' : '1px solid var(--beige)',
              background: m.categoria === k ? 'var(--beige)' : 'transparent',
              color: 'var(--texto)', fontSize: 12, fontWeight: m.categoria === k ? 700 : 500,
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            }}>
              <span style={{ fontSize: 18 }}>{v.icon}</span>
              <span>{v.label}</span>
              <span style={{ fontSize: 9, color: v.tipo === 'egreso' ? 'var(--rojo)' : 'var(--verde)', fontWeight: 700 }}>
                {v.tipo === 'egreso' ? 'SALE' : 'ENTRA'}
              </span>
            </button>
          ))}
        </div>

        {/* Vincular con encargo (solo seña/saldo) */}
        {vinculable && pedidos.length > 0 && (
          <>
            <label style={S.label}>Vincular con un encargo (opcional)</label>
            <select value={m.pedidoId} onChange={e => elegirPedido(e.target.value)} style={{ ...S.input, marginTop: 4 }}>
              <option value="">— Sin vincular —</option>
              {pedidos.map(p => (
                <option key={p.id} value={p.id}>{p.clienteNombre}{p.producto ? ' · ' + p.producto : ''}</option>
              ))}
            </select>
          </>
        )}

        <Campo label="Concepto" value={m.concepto} onChange={v => set('concepto', v)} placeholder={`Ej: ${cat.label} de Juana`} />
        <Campo label="Monto ($)" value={m.monto} onChange={v => set('monto', v)} placeholder="0" tipo="number" />

        {/* Forma de pago */}
        <label style={S.label}>Forma de pago</label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 12 }}>
          {PAGOS_CAJA.map(([k, l]) => (
            <button key={k} onClick={() => set('formaPago', k)} style={{
              padding: '9px 4px', borderRadius: 9, fontSize: 12,
              fontWeight: m.formaPago === k ? 700 : 400,
              border: m.formaPago === k ? '2px solid var(--caramelo)' : '1px solid var(--beige)',
              background: m.formaPago === k ? 'var(--beige)' : 'none', color: 'var(--texto)', cursor: 'pointer',
            }}>{l}</button>
          ))}
        </div>

        <Campo label="Fecha" value={m.fecha} onChange={v => set('fecha', v)} tipo="date" />

        {/* Vista previa */}
        {Number(m.monto) > 0 && (
          <div style={{
            background: cat.tipo === 'egreso' ? 'rgba(192,57,43,0.07)' : 'rgba(39,174,96,0.08)',
            border: `1px solid ${cat.tipo === 'egreso' ? 'rgba(192,57,43,0.3)' : 'rgba(39,174,96,0.3)'}`,
            borderRadius: 10, padding: '10px 14px', marginTop: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <span style={{ fontSize: 13, color: 'var(--texto2)' }}>{cat.tipo === 'egreso' ? 'Sale de caja' : 'Entra a caja'}</span>
            <b style={{ fontSize: 16, color: cat.tipo === 'egreso' ? 'var(--rojo)' : 'var(--verde)' }}>
              {cat.tipo === 'egreso' ? '−' : '+'}{formatPeso(m.monto)}
            </b>
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={guardar} style={{ ...S.btnPrimario, flex: 1, padding: 14, fontSize: 15 }}>
            {m.id ? '✓ Guardar' : '+ Registrar movimiento'}
          </button>
          <button onClick={onCancelar} style={{ ...S.btnSecundario, padding: 14 }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// SUB-NAVEGACIÓN (hub): permite agrupar pantallas dentro de una pestaña
// ══════════════════════════════════════════════════════════════════════
function HubToggle({ opciones, activo, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 6, padding: '10px 16px 2px' }}>
      {opciones.map(([k, l]) => (
        <button key={k} onClick={() => onChange(k)} style={{
          flex: 1, padding: '9px 6px', borderRadius: 10, cursor: 'pointer', fontSize: 13,
          fontWeight: activo === k ? 700 : 500,
          border: activo === k ? '2px solid var(--caramelo)' : '1px solid var(--beige)',
          background: activo === k ? 'var(--beige)' : 'transparent',
          color: 'var(--texto)', transition: 'all .15s',
        }}>{l}</button>
      ))}
    </div>
  );
}

// Pestaña PEDIDOS → contiene Encargos + Día (Planificar/Vender) + Recetas
function HubPedidos({ uid, ingBase, recBase }) {
  const [sub, setSub] = useState('pedidos');
  return (
    <div>
      <HubToggle opciones={[['pedidos', '📋 Encargos'], ['dia', '📅 Día'], ['recetas', '🍰 Recetas']]} activo={sub} onChange={setSub} />
      {sub === 'pedidos' && <PantallaPedidos uid={uid} />}
      {sub === 'dia'     && <PantallaDia uid={uid} ingBase={ingBase} recBase={recBase} />}
      {sub === 'recetas' && <PantallaRecetas uid={uid} />}
    </div>
  );
}

// Sección DÍA → une Planificación (Planificar) + Productos del día (Vender)
function PantallaDia({ uid }) {
  const hoy = () => new Date().toISOString().slice(0,10);

  // Recetas disponibles (para agregar productos rápido)
  const loadRec = () => { try { return JSON.parse(localStorage.getItem('dg_rc_rec')) || REC_DEFAULT_RC; } catch { return REC_DEFAULT_RC; } };
  const [recetas, setRecetas] = useState(loadRec);
  useEffect(() => {
    if (!uid) return;
    db.collection(`reposteria/${uid}/recetas`).doc('recetario').get()
      .then(s => { if (s.exists && s.data().data?.length) setRecetas(s.data().data); }).catch(()=>{});
  }, [uid]);

  // Productos del día (carga una vez; editás local y se guarda al salir del campo)
  const [items, setItems]       = useState([]);
  const [cargando, setCargando] = useState(true);
  const [sel, setSel]           = useState('');
  const [pago, setPago]         = useState('efectivo');

  useEffect(() => {
    if (!uid) return;
    db.collection(`reposteria/${uid}/planificacion`).doc(hoy()).get()
      .then(s => {
        const raw = s.exists ? (s.data().items || []) : [];
        setItems(raw.map(it => ({
          recetaId: it.recetaId,
          nombre:   it.nombre || it.recetaNombre || 'Producto',
          emoji:    it.emoji  || it.recetaEmoji  || '🍰',
          precio:   Number(it.precio) || 0,
          cantidad: Number(it.cantidad) || 0,   // hechos hoy (lo usa el Resumen para el costo)
          vendidos: Number(it.vendidos) || 0,
        })));
        setCargando(false);
      })
      .catch(()=>setCargando(false));
  }, [uid]);

  const persistir = (arr) => { db.collection(`reposteria/${uid}/planificacion`).doc(hoy()).set({ items: arr }).catch(()=>{}); };

  const agregarProducto = () => {
    const r = recetas.find(x => x.id === sel);
    if (!r) return;
    if (items.some(i => i.recetaId === r.id)) { setSel(''); return; }
    const nuevos = [...items, { recetaId:r.id, nombre:r.nombre, emoji:r.emoji||'🍰', precio:Number(r.precioVenta)||0, cantidad:0, vendidos:0 }];
    setItems(nuevos); persistir(nuevos); setSel('');
  };
  const setCampoLocal = (id, campo, val) => setItems(prev => prev.map(i => i.recetaId===id ? {...i, [campo]:val} : i));
  const quitar = (id) => { const n = items.filter(i => i.recetaId!==id); setItems(n); persistir(n); };

  const vender = async (item) => {
    const hora = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    await db.collection(`reposteria/${uid}/caja`).add({
      tipo:'ingreso', categoria:'venta',
      concepto:'Venta del día — ' + item.nombre,
      monto: item.precio, formaPago: pago,
      fecha: hoy(), hora, origen:'mostrador', createdAt: new Date(),
    });
    const n = items.map(i => i.recetaId===item.recetaId ? {...i, vendidos:i.vendidos+1} : i);
    setItems(n); persistir(n);
  };

  const totalDia = items.reduce((s,i)=> s + i.precio*i.vendidos, 0);
  const inp = { width:'100%', padding:'8px 10px', borderRadius:8, border:'1px solid var(--beige)', background:'var(--crema)', color:'var(--texto)', fontSize:14 };

  return (
    <div style={{ padding:'12px 16px 110px' }}>
      {/* Agregar producto del día */}
      <div style={{ background:'var(--dorado)', borderRadius:12, padding:'12px 14px', marginBottom:14 }}>
        <p style={{ fontSize:12, fontWeight:700, color:'var(--barTxt)', textTransform:'uppercase', marginBottom:8 }}>➕ Producto del día</p>
        <div style={{ display:'flex', gap:8 }}>
          <select value={sel} onChange={e=>setSel(e.target.value)} style={{ flex:1, padding:'11px 12px', borderRadius:10, border:'1.5px solid var(--caramelo)', background:'var(--superficie)', color:'var(--texto)', fontSize:14 }}>
            <option value="">Elegí una receta…</option>
            {recetas.map(r => <option key={r.id} value={r.id}>{(r.emoji||'🍰')+' '+r.nombre}</option>)}
          </select>
          <button onClick={agregarProducto} disabled={!sel} style={{ ...S.btnPrimario, padding:'11px 16px', opacity: sel?1:0.5 }}>Agregar</button>
        </div>
      </div>

      {/* Total del día + forma de pago */}
      <div style={{ background:'var(--chocolate)', color:'var(--barTxt)', borderRadius:12, padding:'12px 16px', marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, opacity:.8 }}>Vendido hoy</span>
          <span style={{ fontFamily:'Playfair Display', fontSize:24, fontWeight:700 }}>{rcPeso(totalDia)}</span>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {[['efectivo','💵 Efectivo'],['transferencia','🏦 Transfer.']].map(([k,l]) => (
            <button key={k} onClick={()=>setPago(k)} style={{ flex:1, padding:'7px', borderRadius:8, border:'1px solid rgba(255,255,255,0.25)', cursor:'pointer', fontSize:12, fontWeight:700, background: pago===k?'var(--caramelo)':'transparent', color:'var(--barTxt)' }}>{l}</button>
          ))}
        </div>
      </div>

      {/* Lista de productos */}
      {cargando ? <p style={{ textAlign:'center', color:'var(--texto2)', padding:30 }}>Cargando…</p>
       : items.length===0 ? (
        <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--texto2)' }}>
          <div style={{ fontSize:40, marginBottom:8 }}>🧁</div>
          <p style={{ fontWeight:600 }}>Sin productos para hoy</p>
          <p style={{ fontSize:13 }}>Elegí una receta arriba y agregala.</p>
        </div>
       ) : items.map(item => {
        const quedan = Math.max(0, item.cantidad - item.vendidos);
        return (
          <div key={item.recetaId} style={{ background:'var(--superficie)', border:'1px solid var(--beige)', borderRadius:14, padding:14, marginBottom:10 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
              <div>
                <div style={{ fontWeight:700, fontSize:15, color:'var(--texto)' }}>{item.emoji} {item.nombre}</div>
                <div style={{ fontSize:12, color:'var(--texto2)', marginTop:2 }}>Vendidos: <b>{item.vendidos}</b> · Quedan: <b>{quedan}</b></div>
              </div>
              <button onClick={()=>quitar(item.recetaId)} style={{ background:'none', border:'none', color:'var(--texto2)', cursor:'pointer', fontSize:18, lineHeight:1 }}>✕</button>
            </div>
            <div style={{ display:'flex', gap:8, marginTop:10, alignItems:'flex-end' }}>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:10, color:'var(--texto2)', display:'block', marginBottom:3 }}>Hechos hoy</label>
                <input type="number" value={item.cantidad} onChange={e=>setCampoLocal(item.recetaId,'cantidad',Math.max(0,Number(e.target.value)||0))} onBlur={()=>persistir(items)} style={inp} />
              </div>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:10, color:'var(--texto2)', display:'block', marginBottom:3 }}>Precio c/u</label>
                <input type="number" value={item.precio} onChange={e=>setCampoLocal(item.recetaId,'precio',Math.max(0,Number(e.target.value)||0))} onBlur={()=>persistir(items)} style={inp} />
              </div>
              <button onClick={()=>vender(item)} style={{ ...S.btnPrimario, padding:'10px 14px', whiteSpace:'nowrap' }}>Vender 1</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// (HubRecetas eliminado: Recetas y Planificación ahora viven dentro de Pedidos)

// Pestaña CONFIG → contiene Configuración + Caja + Resumen
function HubConfig({ uid, ingBase, recBase, onLogout }) {
  const [sub, setSub] = useState('ajustes');
  return (
    <div>
      <HubToggle opciones={[['ajustes', '⚙️ Config'], ['caja', '💰 Caja'], ['resumen', '📊 Resumen']]} activo={sub} onChange={setSub} />
      {sub === 'ajustes' && <PantallaAjustes onLogout={onLogout} />}
      {sub === 'caja'    && <PantallaCaja uid={uid} />}
      {sub === 'resumen' && <PantallaResumen uid={uid} ingBase={ingBase} recBase={recBase} />}
    </div>
  );
}

function BannerConexion(){
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  if (online) return null;
  return (
    <div style={{ background:'#C0392B', color:'#fff', textAlign:'center', fontSize:12, fontWeight:600, padding:'7px 12px', lineHeight:1.4 }}>
      ⚠️ Sin conexión — tus cambios se guardan y se sincronizan cuando vuelva internet.
    </div>
  );
}

function App() {
  const [fase, setFase] = useState(()=>{
    const lic = getLicenciaRepos();
    if(!lic||!lic.activado) return "activacion";
    return "pin";
  });
  const [tab, setTab] = useState('pedidos');

  if(fase==="activacion") return <PantallaActivacionRepos onActivado={pin=>{ setFase("pin"); }} />;
  const lic = getLicenciaRepos();
  // Vínculo de seguridad: este negocio (identificado por el dispositivo)
  // queda atado a la sesión real de Firebase antes de dejar entrar a la
  // app — se espera a que termine ANTES de mostrar cualquier pantalla,
  // porque las pantallas ya arrancan a pedir datos apenas se montan.
  const entrarAlApp = async () => {
    try {
      const licActual = getLicenciaRepos();
      const deviceId = (licActual && licActual.deviceId) || "default";
      const user = await esperarAuthListoRepos();
      await db.collection("reposteria").doc(deviceId).set({ownerAuthUid:user.uid}, {merge:true});
    } catch(e) { /* si falla, se reintenta la próxima vez que se abra la app */ }
    setFase("app");
  };
  if(fase==="pin") return <PantallaPinRepos pin={lic?.pin} onOk={entrarAlApp} />;

  const ingBase = ING_DEFAULT_RC;
  const recBase = REC_DEFAULT_RC;
  const uid = (getLicenciaRepos()?.deviceId) || "default";
  const pantallas = {
    pedidos:  <HubPedidos uid={uid} ingBase={ingBase} recBase={recBase} />,
    ajustes:  <HubConfig uid={uid} ingBase={ingBase} recBase={recBase} onLogout={() => auth.signOut()} />,
  };

  return (
    <div style={{ paddingBottom: 84 }}>
      <BannerConexion />
      <Header titulo="Dulce Gestión 🍰" />
      {pantallas[tab] || pantallas.pedidos}
      <NavBar activo={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<script>
// ── SERVICE WORKER (PWA) ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swContent = [
      "const CACHE='dg-v1';",
      "self.addEventListener('install',e=>self.skipWaiting());",
      "self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!=='dg-v1').map(n=>caches.delete(n))))));",
      "self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>{const n=fetch(e.request).then(r=>{if(r.ok)caches.open('dg-v1').then(ca=>ca.put(e.request,r.clone()));return r;}).catch(()=>c);return c||n;}));});"
    ].join('\n');
    const blob = new Blob([swContent], {type:'text/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>
