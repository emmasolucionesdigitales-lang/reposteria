  <style>
    :root {
      --chocolate:  #2A2520;
      --cacao:      #463E36;
      --caramelo:   #A07B4F;
      --dorado:     #C7AE86;
      --crema:      #F5F3EF;
      --barTxt:     #F5F3EF;
      --beige:      #E6E1D8;
      --beige2:     #E6E1D8;
      --superficie: #FFFFFF;
      --texto:      #211C17;
      --texto2:     #6F665B;
      --verde:      #27AE60;
      --rojo:       #C0392B;
      --naranja:    #E67E22;
      --gris:       #7F8C8D;
      --sombra:     0 3px 14px rgba(44,18,6,0.10);
      --sombra2:    0 4px 20px rgba(44,18,6,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      color: var(--texto);
      min-height: 100vh;
    }
    input, select, textarea, button {
      font-family: 'DM Sans', sans-serif;
    }
    /* scrollbar sutil */
    ::-webkit-scrollbar { width: 4px; }
    /* ── utilidades globales ── */
    .card-base {
      background: var(--superficie);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--beige);
      box-shadow: var(--sombra);
    }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    /* modal overlay global */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(44,18,6,0.52);
      z-index: 200;
      display: flex; align-items: flex-end;
    }
    .modal-sheet {
      background: var(--superficie);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 44px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--beige2); border-radius: 4px; }

function Campo({ label, value, onChange, placeholder, tipo = 'text', rows, children }) {
  return (
    <>
      {label && <label style={S.label}>{label}</label>}
      {rows
        ? <textarea value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder} rows={rows}
            style={{ ...S.input, resize: 'vertical' }} />
        : tipo === 'select'
        ? <select value={value} onChange={e => onChange(e.target.value)} style={S.input}>

          </select>
        : <input type={tipo} value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder} style={S.input} />
      }
    </>
  );
}

  const t = (id === 'carbon') ? TEMA_CARBON : (TEMAS_DG[id] || TEMAS_DG.lino);
  const r = document.documentElement.style;
  r.setProperty('--chocolate',  t.chocolate);
  r.setProperty('--cacao',      t.cacao);
  r.setProperty('--caramelo',   t.caramelo);
  r.setProperty('--dorado',     t.dorado);
  r.setProperty('--crema',      t.crema);
  r.setProperty('--beige',      t.beige);
  r.setProperty('--beige2',     t.beige);
  r.setProperty('--superficie', t.superficie);
  r.setProperty('--texto',      t.texto);
  r.setProperty('--texto2',     t.texto2);
  r.setProperty('--barTxt',     t.barTxt || t.crema);
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', t.chocolate);
  if (id !== 'carbon') localStorage.setItem('dg_tema', id);
}

function _uidRepos(){try{return (JSON.parse(localStorage.getItem('repos_licencia')||'null')||{}).deviceId||'default';}catch{return 'default';}}
function _limpiarTSRepos(o){
  if(o&&typeof o==='object'){
    if(typeof o.toDate==='function'){try{return o.toDate().toISOString();}catch{return null;}}
    if(Array.isArray(o))return o.map(_limpiarTSRepos);
    const r={};for(const k in o)r[k]=_limpiarTSRepos(o[k]);return r;
  }
  return o;
}
async function exportarRespaldoRepos(){
  try{
    const uid=_uidRepos();
    const cols=['productos','pedidos','stock','recetas','planificacion','caja'];
    const data={};
    for(const c of cols){
      const snap=await db.collection('reposteria/'+uid+'/'+c).get();
      data[c]=snap.docs.map(d=>_limpiarTSRepos(Object.assign({_id:d.id},d.data())));
    }
    const local={};['dg_nombre','dg_tema','dg_dark','dg_escala','dg_rc_ing','dg_rc_rec'].forEach(k=>{const v=localStorage.getItem(k);if(v!=null)local[k]=v;});
    const payload={app:'Dulce Gestion',fecha:new Date().toISOString(),uid,data,local};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='respaldo-dulcegestion-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){alert('No se pudo exportar: '+(e&&e.message||e));}
}
async function restaurarRespaldoRepos(file){
  let obj;
  try{obj=JSON.parse(await file.text());}catch(e){alert('El archivo no es un .json válido.');return;}
  const data=(obj&&obj.data)?obj.data:null;
  if(!data){alert('El archivo no es un respaldo de Dulce Gestion válido.');return;}
  const cols=['productos','pedidos','stock','recetas','planificacion','caja'];
  const total=cols.reduce((a,c)=>a+((data[c]||[]).length),0);
  if(!confirm('Esto va a SUBIR a la nube '+total+' registros del respaldo (reemplaza los que tengan el mismo código). ¿Continuar?'))return;
  try{
    const uid=_uidRepos();
    for(const c of cols){
      const arr=data[c]||[];
      for(let i=0;i<arr.length;i+=400){
        const batch=db.batch();
        arr.slice(i,i+400).forEach(item=>{
          const rest=Object.assign({},item);delete rest._id;
          const ref=item._id?db.collection('reposteria/'+uid+'/'+c).doc(item._id):db.collection('reposteria/'+uid+'/'+c).doc();
          batch.set(ref,rest);
        });
        await batch.commit();
      }
    }
    if(obj.local){Object.keys(obj.local).forEach(k=>localStorage.setItem(k,obj.local[k]));}
    alert('✅ Respaldo restaurado en la nube. La app se va a recargar.');
    location.reload();
  }catch(e){alert('Error al restaurar: '+(e&&e.message||e));}
}

// ── Acceso por biometría (huella / Face ID) con WebAuthn ──────────
function bioSoportada() {
  return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create);
}
function bioActiva() {
  return localStorage.getItem('dg_bio_on') === '1' && !!localStorage.getItem('dg_bio_cred');
}
function _bioB64(buf)  { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); }
function _bioDesB64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function bioRegistrar() {
  if (!bioSoportada()) throw new Error('Este dispositivo o navegador no soporta huella/Face ID.');
  const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
  const userId    = new Uint8Array(16); crypto.getRandomValues(userId);
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: 'Dulce Gestión' },
      user: { id: userId, name: 'dueno', displayName: 'Dueño' },
      pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000,
      attestation: 'none',
    }
  });
  if (!cred) throw new Error('No se pudo registrar la huella.');
  localStorage.setItem('dg_bio_cred', _bioB64(cred.rawId));
  localStorage.setItem('dg_bio_on', '1');
  return true;
}

async function bioVerificar() {
  const credId = localStorage.getItem('dg_bio_cred');
  if (!credId) throw new Error('No hay huella registrada.');
  const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
  const ok = await navigator.credentials.get({
    publicKey: {
      challenge,
      allowCredentials: [{ type: 'public-key', id: _bioDesB64(credId), transports: ['internal'] }],
      userVerification: 'required',
      timeout: 60000,
    }
  });
  if (!ok) throw new Error('No se pudo verificar la huella.');
  return true;
}

// PANTALLA: PEDIDOS — lista
// ══════════════════════════════════════════════════════
function PantallaPedidos({ uid }) {
  const [pedidos, setPedidos] = useState([]);
  const [form, setForm]       = useState(null);
  const [cargando, setCarga]  = useState(true);
  const [filtro, setFiltro]   = useState('activos');

  // ── Recetas (para cargar encargos rápido) ──
  const loadRecPick = () => { try { return JSON.parse(localStorage.getItem('dg_rc_rec')) || REC_DEFAULT_RC; } catch { return REC_DEFAULT_RC; } };
  const [recetas, setRecetas] = useState(loadRecPick);
  useEffect(() => {
    if (!uid) return;
    db.collection(`reposteria/${uid}/recetas`).doc('recetario').get()
      .then(snap => { if (snap.exists && snap.data().data?.length) setRecetas(snap.data().data); })
      .catch(() => {});
  }, [uid]);

  const col = db.collection(`reposteria/${uid}/pedidos`);

  useEffect(() => {
    const unsub = col.orderBy('fechaEntrega', 'asc').onSnapshot(snap => {
      setPedidos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setCarga(false);
    });
    return unsub;
  }, []);

  const guardar = async (datos) => {
    const { id, ...resto } = datos;
    if (id) {
      await col.doc(id).update({ ...resto, updatedAt: new Date() });
    } else {
      const ahora = new Date();
      const fechaCreado = ahora.toISOString().slice(0, 10);
      const horaCreado  = ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
      await col.add({ ...resto, fechaCreado, horaCreado, createdAt: ahora, updatedAt: ahora });
      // ── Si el encargo tiene seña, entra sola a la Caja ──
      if (Number(resto.sena) > 0) {
        await db.collection(`reposteria/${uid}/caja`).add({
          tipo: 'ingreso',
          categoria: 'sena',
          concepto: 'Seña — ' + (resto.clienteNombre || '') + (resto.producto ? ' (' + resto.producto + ')' : ''),
          monto: Number(resto.sena) || 0,
          formaPago: resto.formaPagoSena || 'efectivo',
          fecha: fechaCreado,
          hora: horaCreado,
          origen: 'encargo',
          createdAt: ahora,
        });
      }
    }
    setForm(null);
  };

  const cambiarEstado = async (id, estado) => {
    await col.doc(id).update({ estado, updatedAt: new Date() });
  };

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar este pedido? Esta acción no se puede deshacer.')) return;
    await col.doc(id).delete();
  };

  if (form !== null) {
    return <FormularioPedido inicial={form} recetas={recetas} onGuardar={guardar} onCancelar={() => setForm(null)} />;
  }

  const activos  = pedidos.filter(p => p.estado !== 'entregado' && p.estado !== 'cancelado');
  const mostrar  = filtro === 'activos' ? activos : pedidos;

  return (
    <div>
      {/* Botón nuevo encargo */}
      <div style={{ padding: '12px 16px 0' }}>
        <button onClick={() => setForm({})} style={{ ...S.btnPrimario, width: '100%', padding: '11px', borderRadius: 12, fontSize: 14 }}>+ Nuevo encargo</button>
      </div>

      {/* Filtros */}
      <div style={{ padding: '12px 16px 4px', display: 'flex', gap: 8 }}>
        {[
          { k: 'activos', lbl: `Activos (${activos.length})` },
          { k: 'todos',   lbl: `Todos (${pedidos.length})` },
        ].map(f => (
          <button key={f.k} onClick={() => setFiltro(f.k)}
            style={{
              padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
              background: filtro === f.k ? 'var(--caramelo)' : 'var(--beige)',
              color: filtro === f.k ? 'white' : 'var(--cacao)',
              fontWeight: 600, fontSize: 13,
            }}>
            {f.lbl}
          </button>
        ))}
      </div>

      {cargando && <p style={{ textAlign: 'center', padding: 40, color: 'var(--texto2)' }}>Cargando...</p>}

      {!cargando && mostrar.length === 0 && (
        <div style={{ textAlign: 'center', padding: 56 }}>
          <div style={{ fontSize: 52 }}>🎂</div>
          <p style={{ color: 'var(--texto2)', marginTop: 10, marginBottom: 20 }}>
            {filtro === 'activos' ? 'No hay pedidos activos' : 'No hay pedidos todavía'}
          </p>
          <button onClick={() => setForm({})} style={S.btnPrimario}>+ Nuevo pedido</button>
        </div>
      )}

      <div style={{ padding: '8px 16px 110px' }}>
        {mostrar.map(p => (
          <TarjetaPedido key={p.id} pedido={p}
            onEditar={() => setForm(p)}
            onEstado={cambiarEstado}
            onEliminar={eliminar} />
        ))}
      </div>
    </div>
  );
}

function TarjetaPedido({ pedido, onEditar, onEstado, onEliminar }) {

    const hoyMs = new Date().setHours(0, 0, 0, 0);
    const entMs = new Date(pedido.fechaEntrega + 'T12:00:00').setHours(0, 0, 0, 0);

  const dias = diasRestantes();

            {pedido.estado === 'a_entregar' && (
              <button onClick={() => onEstado(pedido.id, 'entregado')}
                style={{ ...S.btnPrimario, fontSize: 13, padding: '7px 12px', background: 'var(--gris)' }}>
                ✅ Entregado
              </button>
            )}
            {/* Volver atrás */}
            {(pedido.estado === 'en_produccion' || pedido.estado === 'listo' || pedido.estado === 'a_entregar') && (
              <button onClick={() => {
                const prev = { en_produccion:'pendiente', listo:'en_produccion', a_entregar:'listo' }[pedido.estado];
                onEstado(pedido.id, prev);
              }} style={{ ...S.btnSecundario, fontSize: 12, padding: '7px 10px' }}>
                ↩
              </button>
            )}
            {pedido.estado !== 'cancelado' && pedido.estado !== 'entregado' && (
              <button onClick={() => onEstado(pedido.id, 'cancelado')}
                style={{ ...S.btnPrimario, fontSize: 13, padding: '7px 12px', background: 'var(--rojo)' }}>
                ✕ Cancelar
              </button>
            )}
            <button onClick={() => onEliminar(pedido.id)}
              style={{ ...S.btnSecundario, fontSize: 13, padding: '7px 12px', marginLeft: 'auto', color: 'var(--rojo)' }}>
              🗑️
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// FORMULARIO PEDIDO (nuevo / editar)
// ══════════════════════════════════════════════════════
function FormularioPedido({ inicial, recetas = [], onGuardar, onCancelar }) {
  const [d, setD] = useState({
    clienteNombre: '', telefono: '', producto: '',
    descripcion: '', fechaEntrega: '', precio: '',
    sena: '', estado: 'pendiente', extras: [], formaPagoSena: 'efectivo',
    ...inicial,
  });
  const set = (k, v) => setD(prev => ({ ...prev, [k]: v }));

  // ── Cargar datos desde una receta (autocompleta producto, descripción y precio) ──
  const [recSinPrecio, setRecSinPrecio] = useState(false);
  const cargarDesdeReceta = (recetaId) => {
    const r = recetas.find(x => x.id === recetaId);
    if (!r) return;
    setRecSinPrecio(!r.precioVenta);
    setD(prev => ({
      ...prev,
      producto: r.nombre || prev.producto,
      descripcion: r.descripcion || prev.descripcion,
      precio: r.precioVenta ? String(r.precioVenta) : prev.precio,
    }));
  };

  // ── Extras (decoración, impresión, caja, etc.) ──
  const EXTRAS_SUGERIDOS = ['🖨️ Impresión comestible','🎁 Caja/packaging','🎂 Piso extra','✨ Fondant','🎨 Decoración personalizada','🚚 Envío a domicilio'];
  const [nuevoExtra, setNuevoExtra] = useState('');
  const [nuevoPrecioExtra, setNuevoPrecioExtra] = useState('');

  const agregarExtra = () => {
    if (!nuevoExtra.trim()) return;
    const extra = { id: 'e'+Date.now(), nombre: nuevoExtra.trim(), precio: Number(nuevoPrecioExtra)||0 };
    set('extras', [...(d.extras||[]), extra]);
    setNuevoExtra(''); setNuevoPrecioExtra('');
  };

  const quitarExtra = (id) => set('extras', (d.extras||[]).filter(e=>e.id!==id));
  const editarExtraPrecio = (id, precio) => set('extras', (d.extras||[]).map(e=>e.id===id?{...e,precio:Number(precio)||0}:e));

  // Precio total = precio base + suma de extras
  const totalExtras = (d.extras||[]).reduce((s,e)=>s+(Number(e.precio)||0),0);
  const precioBase  = Number(d.precio)||0;
  const totalFinal  = precioBase + totalExtras;

  const guardar = () => {
    if (!d.clienteNombre.trim()) return alert('El nombre del cliente es obligatorio');
    if (!d.producto.trim())      return alert('El producto es obligatorio');
    onGuardar({
      ...d,
      precio: totalFinal,
      precioBase: precioBase,
      extras: d.extras||[],
      sena: Number(d.sena) || 0,
    });
  };

  return (
    <div>
      <Header titulo={d.id ? '✏️ Editar Pedido' : '+ Nuevo Encargo'} onBack={onCancelar} />
      <div style={{ padding: '16px 16px 110px' }}>

        {/* Cargar rápido desde una receta */}
        {recetas.length > 0 && (
          <div style={{ background:'var(--dorado)', borderRadius:12, padding:'12px 14px', marginBottom:12 }}>
            <p style={{ fontSize:12, fontWeight:700, color:'var(--texto)', textTransform:'uppercase', marginBottom:8 }}>⚡ Cargar desde receta</p>
            <select value="" onChange={e => cargarDesdeReceta(e.target.value)}
              style={{ width:'100%', padding:'11px 12px', borderRadius:10, border:'1.5px solid var(--caramelo)', background:'var(--superficie)', color:'var(--texto)', fontSize:14, cursor:'pointer' }}>
              <option value="">Elegí una receta…</option>
              {recetas.map(r => (
                <option key={r.id} value={r.id}>
                  {(r.emoji||'🍰') + ' ' + r.nombre + (r.rinde ? ' — ' + r.rinde : '')}
                </option>
              ))}
            </select>
            <p style={{ fontSize:11, color:'var(--cacao)', marginTop:6 }}>
              Completa producto, descripción y precio. Después ajustás lo que quieras.
            </p>
            {recSinPrecio && (
              <p style={{ fontSize:11, color:'var(--rojo)', marginTop:4, fontWeight:600 }}>
                ⚠️ Esa receta todavía no tiene precio de venta. Cargáselo en Recetas para que se complete solo.
              </p>
            )}
          </div>
        )}

        {/* Datos del cliente */}
        <div style={{ background:'var(--beige)', borderRadius:12, padding:'12px 14px', marginBottom:12 }}>
          <p style={{ fontSize:12, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', marginBottom:8 }}>👤 Cliente</p>
          <Campo label="Nombre *" value={d.clienteNombre} onChange={v => set('clienteNombre', v)} placeholder="Nombre completo" />
          <Campo label="Teléfono" value={d.telefono} onChange={v => set('telefono', v)} placeholder="Ej: 381 123 4567" tipo="tel" />
        </div>

        {/* Producto */}
        <div style={{ background:'var(--beige)', borderRadius:12, padding:'12px 14px', marginBottom:12 }}>
          <p style={{ fontSize:12, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', marginBottom:8 }}>🍰 Pedido</p>
          <Campo label="Producto *" value={d.producto} onChange={v => set('producto', v)} placeholder="Ej: Torta de cumpleaños 3 pisos" />
          <Campo label="Descripción / Detalles" value={d.descripcion} onChange={v => set('descripcion', v)}
            placeholder="Sabor, relleno, decoración, observaciones..." rows={3} />
          <Campo label="Fecha de entrega" value={d.fechaEntrega} onChange={v => set('fechaEntrega', v)} tipo="date" />
        </div>

        {/* Precio base + extras */}
        <div style={{ background:'var(--beige)', borderRadius:12, padding:'12px 14px', marginBottom:12 }}>
          <p style={{ fontSize:12, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', marginBottom:8 }}>💰 Precios</p>
          <Campo label="Precio base del producto ($)" value={d.precio} onChange={v => set('precio', v)} placeholder="0" tipo="number" />

          {/* Lista de extras */}
          <label style={{...S.label, marginTop:12}}>🎁 Extras / adicionales</label>
          {(d.extras||[]).length > 0 && (
            <div style={{ marginBottom:8 }}>
              {(d.extras||[]).map(e => (
                <div key={e.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', borderBottom:'1px solid var(--beige2)' }}>
                  <span style={{ flex:1, fontSize:13, color:'var(--texto)' }}>{e.nombre}</span>
                  <input type="number" value={e.precio||''} onChange={ev=>editarExtraPrecio(e.id,ev.target.value)}
                    placeholder="$0" style={{ width:80, padding:'5px 8px', borderRadius:8, border:'1.5px solid var(--beige2)', fontSize:13, textAlign:'right', background:'var(--superficie)' }}/>
                  <button onClick={()=>quitarExtra(e.id)}
                    style={{ background:'none', border:'none', color:'var(--rojo)', cursor:'pointer', fontSize:16 }}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Sugerencias rápidas */}
          <div style={{ display:'flex', gap:5, flexWrap:'wrap', marginBottom:8 }}>
            {EXTRAS_SUGERIDOS.filter(s=>!(d.extras||[]).some(e=>e.nombre===s)).map(s => (
              <button key={s} onClick={()=>{ set('extras',[...(d.extras||[]),{id:'e'+Date.now(),nombre:s,precio:0}]); }}
                style={{ padding:'4px 9px', borderRadius:20, border:'1px dashed var(--caramelo)', background:'transparent', color:'var(--caramelo)', fontSize:11, cursor:'pointer' }}>
                + {s}
              </button>
            ))}
          </div>

          {/* Agregar extra personalizado */}
          <div style={{ display:'flex', gap:6, marginBottom:6 }}>
            <input value={nuevoExtra} onChange={e=>setNuevoExtra(e.target.value)}
              placeholder="Nombre del extra..." onKeyDown={e=>e.key==='Enter'&&agregarExtra()}
              style={{ flex:1, padding:'8px 10px', borderRadius:9, border:'1.5px solid var(--beige2)', background:'var(--superficie)', fontSize:13 }}/>
            <input type="number" value={nuevoPrecioExtra} onChange={e=>setNuevoPrecioExtra(e.target.value)}
              placeholder="$" onKeyDown={e=>e.key==='Enter'&&agregarExtra()}
              style={{ width:70, padding:'8px', borderRadius:9, border:'1.5px solid var(--beige2)', background:'var(--superficie)', fontSize:13 }}/>
            <button onClick={agregarExtra}
              style={{ padding:'8px 12px', borderRadius:9, border:'none', background:'var(--caramelo)', color:'white', fontWeight:700, cursor:'pointer' }}>+</button>
          </div>

          {/* Desglose total */}
          {(d.extras||[]).length > 0 && (
            <div style={{ background:'var(--superficie)', borderRadius:10, padding:'10px 12px', marginTop:8 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'var(--texto2)', marginBottom:4 }}>
                <span>Precio base</span><span>{formatPeso(precioBase)}</span>
              </div>
              {(d.extras||[]).map(e=>(
                <div key={e.id} style={{ display:'flex', justifyContent:'space-between', fontSize:12, color:'var(--texto2)', marginBottom:2 }}>
                  <span>{e.nombre}</span><span>{formatPeso(e.precio)}</span>
                </div>
              ))}
              <div style={{ display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--beige)', paddingTop:6, marginTop:4, fontWeight:700, fontSize:15, color:'var(--texto)' }}>
                <span>Total</span><span>{formatPeso(totalFinal)}</span>
              </div>
            </div>
          )}
        </div>

        {/* Seña */}
        <div style={{ background:'var(--beige)', borderRadius:12, padding:'12px 14px', marginBottom:12 }}>
          <p style={{ fontSize:12, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', marginBottom:8 }}>💵 Pago</p>
          <Campo label="Seña / Adelanto ($)" value={d.sena} onChange={v => set('sena', v)} placeholder="0" tipo="number" />
          {Number(d.sena) > 0 && !d.id && (
            <div style={{ marginTop: 4 }}>
              <label style={{ ...S.label, fontSize: 12 }}>Forma de pago de la seña (entra a la Caja)</label>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginTop: 4 }}>
                {[['efectivo','💵 Efectivo'],['transferencia','📱 Transfer.'],['debito','💳 Débito'],['credito','💳 Crédito']].map(([k, l]) => (
                  <button key={k} onClick={() => set('formaPagoSena', k)} style={{
                    padding: '8px 4px', borderRadius: 9, fontSize: 12,
                    fontWeight: d.formaPagoSena === k ? 700 : 400,
                    border: d.formaPagoSena === k ? '2px solid var(--caramelo)' : '1px solid var(--beige2)',
                    background: d.formaPagoSena === k ? 'var(--superficie)' : 'none', color: 'var(--texto)', cursor: 'pointer',
                  }}>{l}</button>
                ))}
              </div>
            </div>
          )}
          {totalFinal > 0 && (
            <div style={{ display:'flex', justifyContent:'space-between', background:'var(--superficie)', borderRadius:10, padding:'10px 12px', marginTop:6, fontSize:13 }}>
              <span style={{ color:'var(--texto2)' }}>Saldo restante</span>
              <b style={{ color: (totalFinal - Number(d.sena)) > 0 ? 'var(--caramelo)' : 'var(--verde)' }}>
                {formatPeso(Math.max(0, totalFinal - Number(d.sena)))}
              </b>
            </div>
          )}
        </div>

        {/* Estado */}
        <label style={S.label}>Estado del pedido</label>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 6 }}>
          {Object.entries(ESTADOS).map(([k, v]) => (
            <button key={k} onClick={() => set('estado', k)}
              style={{
                padding: '7px 12px', borderRadius: 20, cursor: 'pointer',
                border: `2px solid ${d.estado === k ? v.color : 'var(--beige)'}`,
                background: d.estado === k ? v.bg : 'transparent',
                color: d.estado === k ? v.color : 'var(--texto2)',
                fontWeight: 600, fontSize: 12,
              }}>
              {v.label}
            </button>
          ))}
        </div>

        <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
          <button onClick={guardar} style={{ ...S.btnPrimario, flex: 1, padding: 14, fontSize: 15 }}>
            {d.id ? '✓ Guardar cambios' : '+ Crear encargo'}
          </button>
          <button onClick={onCancelar} style={{ ...S.btnSecundario, padding: 14 }}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

// ── helpers de costos ──────────────────────────────────
function rcCostoItem(ing, cantidad) {
  if (!ing || !cantidad) return 0;
  switch (ing.unidad) {
    case 'kg':     return (cantidad / 1000) * ing.precio;
    case 'litro':  return (cantidad / 1000) * ing.precio;
    case 'docena': return (cantidad / 12)   * ing.precio;
    case 'unidad': return  cantidad          * ing.precio;
    default:       return 0;
  }
}
function rcFmtQty(ing, cantidad) {
  if (!ing) return '—';
  switch (ing.unidad) {
    case 'kg':     return cantidad >= 1000 ? (cantidad/1000)+'kg' : cantidad+'g';
    case 'litro':  return cantidad >= 1000 ? (cantidad/1000)+'L'  : cantidad+'ml';
    default:       return cantidad+' un.';
  }
}
function rcPeso(n) { return '$\u202F' + Math.round(n).toLocaleString('es-AR'); }
const RC_UNIT_HINT = { kg:'g', litro:'ml', docena:'un', unidad:'un' };

// ── COMPONENTE: AGREGAR INGREDIENTE RÁPIDO (desde modal de receta) ──
function AgregarIngredienteRapido({ ing, saveIng, uid2, onAgregado }) {
  const [abierto, setAbierto] = React.useState(false);
  const [nombre, setNombre]   = React.useState('');
  const [unidad, setUnidad]   = React.useState('kg');
  const [precio, setPrecio]   = React.useState('');

  const UNIDADES = ['kg','litro','docena','unidad'];

  const guardar = () => {
    if (!nombre.trim()) return alert('Escribí el nombre del ingrediente');
    const nuevoIng = {
      id: '_' + Math.random().toString(36).slice(2,9),
      nombre: nombre.trim(),
      unidad,
      precio: Number(precio)||0,
      margen: 50,
    };
    saveIng([...ing, nuevoIng]);
    onAgregado(nuevoIng);
    setNombre(''); setUnidad('kg'); setPrecio('');
    setAbierto(false);
  };

  if (!abierto) return (
    <button onClick={() => setAbierto(true)}
      style={{ width:'100%', padding:'8px', borderRadius:10, border:'1.5px dashed var(--caramelo)',
        background:'transparent', color:'var(--caramelo)', fontSize:13, cursor:'pointer', marginBottom:8, fontWeight:600 }}>
      + Agregar ingrediente nuevo
    </button>
  );

  return (
    <div style={{ background:'var(--beige)', borderRadius:12, padding:'12px 14px', marginBottom:8, border:'1px solid var(--dorado)' }}>
      <p style={{ fontSize:12, fontWeight:700, color:'var(--texto)', marginBottom:8 }}>🧂 Nuevo ingrediente</p>
      <input value={nombre} onChange={e=>setNombre(e.target.value)}
        placeholder="Nombre (ej: Harina 000)" style={{ display:'block', width:'100%', padding:'9px 12px', borderRadius:9, border:'1.5px solid var(--beige2)', background:'var(--superficie)', fontSize:13, marginBottom:8 }}/>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8 }}>
        <div>
          <p style={{ fontSize:11, color:'var(--texto2)', marginBottom:3 }}>Unidad</p>
          <select value={unidad} onChange={e=>setUnidad(e.target.value)}
            style={{ width:'100%', padding:'8px', borderRadius:8, border:'1.5px solid var(--beige2)', background:'var(--superficie)', fontSize:13 }}>
            {UNIDADES.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
        </div>
        <div>
          <p style={{ fontSize:11, color:'var(--texto2)', marginBottom:3 }}>Precio costo ($)</p>
          <input type="number" value={precio} onChange={e=>setPrecio(e.target.value)}
            placeholder="0" style={{ width:'100%', padding:'8px', borderRadius:8, border:'1.5px solid var(--beige2)', background:'var(--superficie)', fontSize:13 }}/>
        </div>
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <button onClick={() => setAbierto(false)}
          style={{ flex:1, padding:'8px', borderRadius:9, border:'1px solid var(--beige2)', background:'none', color:'var(--texto2)', cursor:'pointer', fontSize:13 }}>Cancelar</button>
        <button onClick={guardar}
          style={{ flex:2, padding:'8px', borderRadius:9, border:'none', background:'var(--caramelo)', color:'white', cursor:'pointer', fontSize:13, fontWeight:700 }}>✓ Agregar</button>
      </div>
    </div>
  );
}

function PantallaRecetas({ uid }) {
  const loadIng = () => { try { return JSON.parse(localStorage.getItem('dg_rc_ing')) || ING_DEFAULT_RC; } catch { return ING_DEFAULT_RC; } };
  const loadRec = () => { try { return JSON.parse(localStorage.getItem('dg_rc_rec')) || REC_DEFAULT_RC; } catch { return REC_DEFAULT_RC; } };

  const [ing, setIngState]   = useState(loadIng);
  React.useEffect(() => {
    if (!uid) return;
    db.collection(`reposteria/${uid}/recetas`).doc('ingredientes').get()
      .then(snap => { if(snap.exists && snap.data().data?.length) { setIngState(snap.data().data); localStorage.setItem('dg_rc_ing', JSON.stringify(snap.data().data)); }})
      .catch(()=>{});
    db.collection(`reposteria/${uid}/recetas`).doc('recetario').get()
      .then(snap => { if(snap.exists && snap.data().data?.length) { setRecState(snap.data().data); localStorage.setItem('dg_rc_rec', JSON.stringify(snap.data().data)); }})
      .catch(()=>{});
  }, [uid]);
  const [rec, setRecState]   = useState(loadRec);
  const [subTab, setSubTab]  = useState('recetas');
  const [modIngr, setModIngr]= useState(null);  // null | {} | {id,...}
  const [modRec, setModRec]  = useState(null);  // null | {} | {id,...}
  const [verRec, setVerRec]  = useState(null);
  const [calcId, setCalcId]  = useState(null);
  const [calcN, setCalcN]    = useState(1);
  const [margen, setMargen]  = useState(150);
  const [calcPorc, setCalcPorc] = useState(8);
  useEffect(() => {
    const r = rec.find(x => x.id === calcId);
    if (r && r.rinde_num) setCalcPorc(r.rinde_num);
  }, [calcId]);

  const saveIng = v => {
    setIngState(v);
    localStorage.setItem('dg_rc_ing', JSON.stringify(v));
    if(uid) db.collection(`reposteria/${uid}/recetas`).doc('ingredientes').set({data: v}).catch(()=>{});
  };
  const saveRec = v => {
    setRecState(v);
    localStorage.setItem('dg_rc_rec', JSON.stringify(v));
    if(uid) db.collection(`reposteria/${uid}/recetas`).doc('recetario').set({data: v}).catch(()=>{});
  };
  const getIng  = id => ing.find(i => i.id === id);
  const uid2    = () => '_' + Math.random().toString(36).slice(2,9);
  const costoRec= r => (r.ingredientes||[]).reduce((s,ir) => s + rcCostoItem(getIng(ir.ingId), ir.cantidad), 0);

  // ── SUB-TABS BAR ──────────────────────────────────
  const SubTab = () => {
    const tabs2 = [
      { id:'recetas', icon:'📖', lbl:'Recetas' },
      { id:'stock',   icon:'📦', lbl:'Stock'   },
    ];
    return (
      <div style={{ display:'flex', background:'var(--beige)', borderRadius:12, margin:'10px 16px 0', padding:4, gap:4 }}>
        {tabs2.map(t => (
          <button key={t.id} onClick={() => setSubTab(t.id)}
            style={{
              flex:1, border:'none', cursor:'pointer', borderRadius:9, padding:'8px 4px',
              background: subTab===t.id ? 'var(--chocolate)' : 'transparent',
              color: subTab===t.id ? 'var(--barTxt)' : 'var(--texto2)',
              fontWeight: subTab===t.id ? 700 : 500, fontSize:11,
              display:'flex', flexDirection:'column', alignItems:'center', gap:2,
              transition:'all .15s',
            }}>
            <span style={{ fontSize:18 }}>{t.icon}</span>{t.lbl}
          </button>
        ))}
      </div>
    );
  };

  // ── INGREDIENTES TAB ──────────────────────────────
  const TabStock = () => {
    const [stockFb, setStockFb] = useState([]);
    const [editPrecio, setEditPrecio] = useState(null); // {id, valor}
    useEffect(() => {
      return db.collection(`reposteria/${uid}/stock`).orderBy('nombre','asc')
        .onSnapshot(snap => setStockFb(snap.docs.map(d=>({id:d.id,...d.data()}))));
    }, []);

    const getQty = (nombre) => {
      const s = stockFb.find(s => s.nombre.toLowerCase().trim() === nombre.toLowerCase().trim());
      return s ? Number(s.cantidad)||0 : null;
    };

    const ajustarQty = async (nombre, delta) => {
      const s = stockFb.find(s => s.nombre.toLowerCase().trim() === nombre.toLowerCase().trim());
      if (s) {
        const nueva = Math.max(0, (Number(s.cantidad)||0) + delta);
        await db.collection(`reposteria/${uid}/stock`).doc(s.id).update({ cantidad: nueva });
      } else {
        // Crear en Firestore si no existe
        const ingRef = ing.find(i=>i.nombre===nombre);
        await db.collection(`reposteria/${uid}/stock`).add({
          nombre, cantidad: Math.max(0, delta),
          unidad: ingRef?.unidad||'kg', stockMinimo: 0, costoUnitario: 0
        });
      }
    };

    const guardarPrecioVenta = (id, valor) => {
      saveIng(ing.map(i => i.id===id ? {...i, precioVenta: Number(valor)||0} : i));
      setEditPrecio(null);
    };

    const precioVentaSug = (item) => item.precioVenta || Math.round((item.precio||0) * (1+(item.margen||0)/100));

    return (
      <div style={{ padding:'12px 16px 120px' }}>
        <div style={{ background:'#FEF3E2', border:'1px solid #F39C12', borderRadius:10, padding:'9px 12px', marginBottom:12, fontSize:12, color:'#7D5A1A' }}>
          💡 Actualizá los precios y la cantidad disponible. Si la cantidad es 0 aparece en rojo.
        </div>
        {ing.length === 0 && (
          <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--texto2)' }}>
            <div style={{ fontSize:48 }}>🧂</div>
            <p style={{ marginTop:10 }}>No hay ingredientes.<br/>Tocá <b>+</b> para agregar.</p>
          </div>
        )}
        {ing.map(item => {
          const qty = getQty(item.nombre);
          const sinStock = qty === null || qty === 0;
          const unitLabel = { kg:'/ kg', litro:'/ litro', docena:'/ docena', unidad:'/ unidad' }[item.unidad]||'';
          const pVenta = precioVentaSug(item);
          const editandoEste = editPrecio && editPrecio.id === item.id;
          return (
            <div key={item.id} style={{ background:'var(--superficie)', borderRadius:14, padding:'12px 14px', marginBottom:10, border: sinStock ? '1.5px solid var(--rojo)' : '1px solid var(--beige)', boxShadow:'var(--sombra)', backgroundColor: sinStock ? 'rgba(192,57,43,0.04)' : 'var(--superficie)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                    <span style={{ fontWeight:700, fontSize:15, color: sinStock ? 'var(--rojo)' : 'var(--chocolate)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.nombre}</span>
                    {sinStock && <span style={{ fontSize:10, fontWeight:700, background:'var(--rojo)', color:'white', borderRadius:6, padding:'1px 6px', flexShrink:0 }}>SIN STOCK</span>}
                  </div>

                  {/* Cantidad disponible */}
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                    <span style={{ fontSize:12, color:'var(--texto2)' }}>Disponible:</span>
                    <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                      <button onClick={() => ajustarQty(item.nombre, -1)} style={{ width:22, height:22, borderRadius:'50%', border:'1px solid var(--beige2)', background:'none', cursor:'pointer', color:'var(--texto)', fontSize:13 }}>-</button>
                      <span style={{ fontSize:14, fontWeight:700, color: sinStock ? 'var(--rojo)' : 'var(--verde)', minWidth:24, textAlign:'center' }}>{qty??0}</span>
                      <button onClick={() => ajustarQty(item.nombre, +1)} style={{ width:22, height:22, borderRadius:'50%', border:'1px solid var(--beige2)', background:'none', cursor:'pointer', color:'var(--texto)', fontSize:13 }}>+</button>
                      <span style={{ fontSize:12, color:'var(--texto2)' }}>{item.unidad}</span>
                    </div>
                  </div>

                  {/* Precio costo y venta */}
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
                    <span style={{ fontSize:12, color:'var(--texto2)' }}>Costo: <b style={{color:'var(--texto)'}}>{rcPeso(item.precio||0)}</b> {unitLabel}</span>
                    <span style={{ fontSize:11, color:'var(--texto2)' }}>·</span>
                    {editandoEste ? (
                      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
                        <span style={{ fontSize:12, color:'var(--texto2)' }}>Venta: $</span>
                        <input type="number" defaultValue={pVenta} id={`pv_${item.id}`}
                          style={{ width:80, padding:'3px 6px', borderRadius:6, border:'1px solid var(--caramelo)', fontSize:13, background:'var(--superficie)', color:'var(--texto)' }}
                          onKeyDown={e => e.key==='Enter' && guardarPrecioVenta(item.id, document.getElementById(`pv_${item.id}`).value)}
                        />
                        <button onClick={() => guardarPrecioVenta(item.id, document.getElementById(`pv_${item.id}`).value)}
                          style={{ background:'var(--verde)', color:'white', border:'none', borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:12 }}>✓</button>
                        <button onClick={() => setEditPrecio(null)}
                          style={{ background:'none', border:'1px solid var(--beige2)', borderRadius:6, padding:'3px 8px', cursor:'pointer', fontSize:12, color:'var(--texto2)' }}>✕</button>
                      </div>
                    ) : (
                      <span style={{ fontSize:12, color:'var(--verde)', fontWeight:600, cursor:'pointer' }} onClick={() => setEditPrecio({id:item.id})}>
                        Venta: {rcPeso(pVenta)} {item.margen>0 && !item.precioVenta ? `(+${item.margen}%)` : item.precioVenta ? '✏️' : ''} ✏️
                      </span>
                    )}
                  </div>
                </div>

                <div style={{ display:'flex', flexDirection:'column', gap:5, flexShrink:0 }}>
                  <button onClick={() => setModIngr(item)} style={{ ...S.btnSecundario, padding:'5px 10px', fontSize:12 }}>✏️</button>
                  <button onClick={() => { if(!confirm('¿Eliminar?')) return; saveIng(ing.filter(i=>i.id!==item.id)); }}
                    style={{ ...S.btnSecundario, padding:'5px 10px', fontSize:12, color:'var(--rojo)' }}>🗑</button>
                </div>
              </div>
            </div>
          );
        })}
        <button onClick={() => setModIngr({})} style={{ ...S.btnPrimario, width:'100%', padding:13, marginTop:6 }}>+ Nuevo ingrediente</button>
      </div>
    );
  };

  // ── RECETAS TAB ───────────────────────────────────
  const TabRecetas = () => (
    <div style={{ padding:'12px 16px 120px' }}>
      {rec.length === 0 && (
        <div style={{ textAlign:'center', padding:'50px 20px', color:'var(--texto2)' }}>
          <div style={{ fontSize:48 }}>📖</div>
          <p style={{ marginTop:10 }}>No hay recetas todavía.<br/>Tocá <b>+</b> para agregar.</p>
        </div>
      )}
      {rec.map(r => {
        const ct = costoRec(r);
        return (
          <div key={r.id} style={{ background:'var(--superficie)', borderRadius:14, padding:'16px', marginBottom:12, border:'1px solid var(--beige)', boxShadow:'var(--sombra)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
              <div>
                <div style={{ fontSize:32, marginBottom:4 }}>{r.emoji}</div>
                <div style={{ fontWeight:700, fontSize:16, color:'var(--texto)', lineHeight:1.25 }}>{r.nombre}</div>
                <div style={{ fontSize:12, color:'var(--texto2)', marginTop:3 }}>{r.descripcion}</div>
                <div style={{ fontSize:11, color:'var(--texto2)', marginTop:2 }}>📦 {r.rinde}</div>
              </div>
              <div style={{ textAlign:'right', flexShrink:0, marginLeft:8 }}>
                <div style={{ fontSize:10, color:'var(--texto2)', marginBottom:2, textTransform:'uppercase', letterSpacing:'.5px' }}>Costo mat.</div>
                <div style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--caramelo)', fontWeight:700 }}>{rcPeso(ct)}</div>
              </div>
            </div>
            <div style={{ display:'flex', gap:7, flexWrap:'wrap' }}>
              <button onClick={() => setVerRec(r)}
                style={{ ...S.btnPrimario, fontSize:12, padding:'7px 11px' }}>👁 Detalle</button>
              <button onClick={() => { setCalcId(r.id); setSubTab('calcular'); }}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px', color:'var(--verde)', background:'#EAF7ED' }}>🧮 Calcular</button>
              <button onClick={() => setModRec(r)}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px' }}>✏️ Editar</button>
              <button onClick={() => { if (!confirm('¿Eliminar esta receta?')) return; saveRec(rec.filter(x => x.id !== r.id)); }}
                style={{ ...S.btnSecundario, fontSize:12, padding:'7px 11px', color:'var(--rojo)' }}>🗑</button>
            </div>
          </div>
        );
      })}
      <button onClick={() => setModRec({})}
        style={{ ...S.btnPrimario, width:'100%', padding:13, marginTop:6 }}>+ Nueva receta</button>
    </div>
  );

  // ── CALCULADORA TAB ───────────────────────────────
  const TabCalcular = () => {
    const recSel = rec.find(r => r.id === calcId);
    const items  = recSel ? recSel.ingredientes.map(ir => {
      const g = getIng(ir.ingId);
      return { nombre: g ? g.nombre : '❓ Borrado', qty: rcFmtQty(g, ir.cantidad), c1: rcCostoItem(g, ir.cantidad) };
    }) : [];
    const costoBase = items.reduce((s, i) => s + i.c1, 0);
    const costoProd = costoBase * calcN;
    const precioUnit= costoBase * (1 + margen / 100);
    const precioTot = precioUnit * calcN;
    const ganancia  = precioTot - costoProd;
    const aplicarPrecio = () => {
      if (!recSel) return;
      const nuevo = Math.round(precioUnit);
      saveRec(rec.map(r => r.id === recSel.id ? { ...r, precioVenta: nuevo } : r));
      alert('✅ Precio aplicado a "' + recSel.nombre + '": ' + rcPeso(nuevo) + '\n\nYa lo podés ajustar a mano en ✏️ Editar receta, y se completa solo al cargar un encargo.');
    };

    return (
      <div style={{ padding:'12px 16px 120px' }}>
        <button onClick={() => setSubTab('recetas')} style={{ ...S.btnSecundario, marginBottom:12, padding:'8px 14px', fontSize:13 }}>← Volver a recetas</button>
        <div style={{ background:'var(--superficie)', borderRadius:14, padding:16, marginBottom:12, boxShadow:'var(--sombra)', border:'1px solid var(--beige)' }}>
          <Campo label="Receta" value={calcId||''} onChange={v => setCalcId(v||null)} tipo="select">
            <option value="">— Elegí una receta —</option>
            {rec.map(r => <option key={r.id} value={r.id}>{r.emoji} {r.nombre}</option>)}
          </Campo>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <Campo label="Cantidad a producir" value={calcN} onChange={v => setCalcN(Math.max(1,Number(v)||1))} tipo="number" placeholder="1" />
            <Campo label="Porciones por unidad" value={calcPorc} onChange={v => setCalcPorc(Math.max(1,Number(v)||1))} tipo="number" placeholder="8" />
          </div>
          <Campo label="Margen ganancia %" value={margen} onChange={v => setMargen(Math.max(0,Number(v)||0))} tipo="number" placeholder="150" />
          <div style={{ fontSize:11, color:'var(--texto2)', textAlign:'center', marginTop:-4 }}>
            Tortas y tartas: mínimo 8 porciones · Margen recomendado: 150%
          </div>
        </div>

        {!recSel && (
          <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--texto2)' }}>
            <div style={{ fontSize:48 }}>🧮</div>
            <p style={{ marginTop:10 }}>Seleccioná una receta<br/>para ver el desglose de costos.</p>
          </div>
        )}

        {recSel && (
          <>
            <div style={{ background:'var(--superficie)', borderRadius:14, padding:16, marginBottom:12, border:'1px solid var(--beige)', boxShadow:'var(--sombra)' }}>
              <div style={{ fontWeight:700, fontSize:15, color:'var(--texto)', marginBottom:12 }}>
                {recSel.emoji} {recSel.nombre} × {calcN}
              </div>
              {items.map((it, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom: i < items.length-1 ? '1px solid var(--beige)' : 'none', fontSize:13, gap:6 }}>
                  <span style={{ flex:1, fontWeight:500 }}>{it.nombre}</span>
                  <span style={{ color:'var(--texto2)', fontSize:12, minWidth:50, textAlign:'right' }}>{it.qty}</span>
                  <span style={{ color:'var(--caramelo)', fontWeight:700, minWidth:72, textAlign:'right' }}>{rcPeso(it.c1 * calcN)}</span>
                </div>
              ))}
            </div>

            <div style={{ background:'var(--chocolate)', color:'var(--barTxt)', borderRadius:14, padding:18 }}>
              {[
                ['Costo materia prima (×'+calcN+')', rcPeso(costoProd), null],
                ['Costo por unidad/porción', rcPeso(costoBase), null],
                ['Margen de ganancia', margen+'%', 'var(--dorado)'],
              ].map(([lbl, val, col], i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'7px 0', fontSize:14, borderBottom:'1px solid rgba(253,245,230,0.1)' }}>
                  <span style={{ opacity:.8 }}>{lbl}</span>
                  <span style={{ fontWeight:700, color: col||'inherit' }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:16, paddingTop:14, borderTop:'1px solid rgba(253,245,230,0.2)' }}>
                <div style={{ fontSize:10, opacity:.6, textTransform:'uppercase', letterSpacing:'.7px', marginBottom:4 }}>
                  Precio sugerido · unidad entera
                </div>
                <div style={{ fontFamily:'Playfair Display', fontSize:32, color:'var(--dorado)', fontWeight:700 }}>{rcPeso(precioUnit)}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop:10, paddingTop:10, borderTop:'1px solid rgba(253,245,230,0.12)' }}>
                  <span style={{ fontSize:12, opacity:.7 }}>Por porción (÷ {calcPorc})</span>
                  <span style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--dorado)', fontWeight:700 }}>{rcPeso(precioUnit / calcPorc)}</span>
                </div>
                <div style={{ fontSize:11, opacity:.55, marginTop:6 }}>Rinde: {recSel.rinde}</div>
              </div>
              <div style={{ marginTop:14, paddingTop:12, borderTop:'1px solid rgba(253,245,230,0.15)' }}>
                {[
                  ['Venta total ('+calcN+' unid.)', rcPeso(precioTot), null],
                  ['🎉 Ganancia neta', rcPeso(ganancia), '#5DADE2'],
                ].map(([lbl,val,col],i) => (
                  <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0', fontSize:14 }}>
                    <span>{lbl}</span>
                    <span style={{ fontWeight:700, color: col||'inherit' }}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:'var(--beige)', borderRadius:10, padding:'11px 14px', fontSize:12, color:'var(--texto2)', marginTop:10, lineHeight:1.5 }}>
              ⚠️ <b>Importante:</b> estos son costos de materia prima solamente. Para el precio real también considerá: gas, mano de obra, packaging y gastos fijos.
            </div>
            <button onClick={aplicarPrecio}
              style={{ ...S.btnPrimario, width:'100%', padding:14, marginTop:10, fontSize:14 }}>
              ✅ Aplicar precio a la receta
            </button>
          </>
        )}
      </div>
    );
  };

  // ── MODAL INGREDIENTE ─────────────────────────────
  const ModalIngr = () => {
    const isEdit = !!(modIngr && modIngr.id);
    const [nombre, setNombre] = useState(modIngr ? modIngr.nombre||'' : '');
    const [unidad, setUnidad] = useState(modIngr ? modIngr.unidad||'kg' : 'kg');
    const [precio,    setPrecio]    = useState(modIngr ? modIngr.precio||'' : '');
    const [margenIng, setMargenIng] = useState(modIngr ? modIngr.margen||50 : 50);

    const guardar = () => {
      if (!nombre.trim()) return alert('Escribí el nombre del ingrediente');
      const datos = { nombre: nombre.trim(), unidad, precio: parseFloat(precio)||0 };
      if (isEdit) saveIng(ing.map(i => i.id === modIngr.id ? {...i,...datos} : i));
      else        saveIng([...ing, { id: uid2(), ...datos }]);
      setModIngr(null);
    };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setModIngr(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'85vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--texto)', marginBottom:16 }}>
            {isEdit ? '✏️ Editar' : '🧂 Nuevo'} Ingrediente
          </h2>
          <Campo label="Nombre del ingrediente" value={nombre} onChange={setNombre} placeholder="Ej: Harina 0000" />
          <label style={S.label}>Unidad de compra</label>
          <select value={unidad} onChange={e => setUnidad(e.target.value)} style={{ ...S.input, marginBottom:14 }}>
            <option value="kg">Kilogramo — precio por kg</option>
            <option value="litro">Litro — precio por litro</option>
            <option value="docena">Docena — precio por 12 unidades</option>
            <option value="unidad">Unidad — precio por unidad</option>
          </select>
          <Campo label={`Precio de costo por ${unidad} ($)`} value={precio} onChange={setPrecio} tipo="number" placeholder="0" />
          <Campo label="Margen de ganancia deseado (%)" value={margenIng} onChange={setMargenIng} tipo="number" placeholder="50" />
          {precio > 0 && margenIng > 0 && (
            <div style={{ fontSize:12, color:'var(--verde)', marginBottom:10, background:'rgba(39,174,96,0.08)', borderRadius:8, padding:'8px 12px', fontWeight:600 }}>

            </div>
          )}
          <div style={{ fontSize:11, color:'var(--texto2)', marginBottom:14, background:'var(--beige)', borderRadius:8, padding:'8px 12px' }}>
            💡 En recetas: kg→gramos, litro→ml, docena/unidad→unidades
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <button onClick={() => setModIngr(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cancelar</button>
            <button onClick={guardar} style={{ ...S.btnPrimario, flex:2, padding:13 }}>💾 Guardar</button>
          </div>
        </div>
      </div>
    );
  };

  // ── MODAL VER RECETA ──────────────────────────────
  const ModalVerRec = () => {
    const r = verRec;
    if (!r) return null;
    const ct = costoRec(r);
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setVerRec(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'90vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--texto)', marginBottom:4 }}>{r.emoji} {r.nombre}</h2>
          <p style={{ fontSize:13, color:'var(--texto2)', marginBottom:4 }}>{r.descripcion}</p>
          <p style={{ fontSize:12, color:'var(--texto2)', marginBottom:14 }}>📦 {r.rinde}</p>
          {(r.ingredientes||[]).map((ir, i) => {
            const g  = getIng(ir.ingId);
            const c1 = rcCostoItem(g, ir.cantidad);
            return (
              <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--beige)', fontSize:13, gap:6 }}>
                <span style={{ flex:1, fontWeight:500 }}>{g ? g.nombre : '❓ Borrado'}</span>
                <span style={{ color:'var(--texto2)', fontSize:12 }}>{rcFmtQty(g, ir.cantidad)}</span>
                <span style={{ color:'var(--caramelo)', fontWeight:700 }}>{rcPeso(c1)}</span>
              </div>
            );
          })}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:16, padding:'14px 16px', background:'var(--chocolate)', borderRadius:12, color:'var(--barTxt)' }}>
            <span style={{ fontSize:14, opacity:.8 }}>Costo total materia prima</span>
            <span style={{ fontFamily:'Playfair Display', fontSize:22, color:'var(--dorado)', fontWeight:700 }}>{rcPeso(ct)}</span>
          </div>
          <div style={{ display:'flex', gap:10, marginTop:14 }}>
            <button onClick={() => setVerRec(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cerrar</button>
            <button onClick={() => { setCalcId(r.id); setSubTab('calcular'); setVerRec(null); }}
              style={{ ...S.btnPrimario, flex:2, padding:13, background:'var(--verde)' }}>🧮 Ir a Calcular</button>
          </div>
        </div>
      </div>
    );
  };

  // ── MODAL EDITAR RECETA ───────────────────────────
  const ModalEditRec = () => {
    const isEdit = !!(modRec && modRec.id);
    const [nombre,    setNombre]   = useState(modRec ? modRec.nombre||'' : '');
    const [emoji,     setEmoji]    = useState(modRec ? modRec.emoji||'🍰' : '🍰');
    const [desc,      setDesc]     = useState(modRec ? modRec.descripcion||'' : '');
    const [rinde,     setRinde]    = useState(modRec ? modRec.rinde||'' : '');
    const [tipo,      setTipo]     = useState(modRec ? modRec.tipo||'delicia' : 'delicia');
    const [rinde_num, setRindeNum] = useState(modRec ? modRec.rinde_num||0 : 0);
    const [precioVenta, setPrecioVenta] = useState(modRec ? modRec.precioVenta||'' : '');
    const [checks, setChecks]   = useState(() => {
      const m = {};
      (modRec && modRec.ingredientes || []).forEach(ir => { m[ir.ingId] = ir.cantidad; });
      return m;
    });

    const toggleIng = (id) => setChecks(prev => {
      const next = {...prev};
      if (next[id] !== undefined) delete next[id];
      else next[id] = '';
      return next;
    });
    const setQty = (id, v) => setChecks(prev => ({...prev, [id]: v}));

    const guardar = () => {
      if (!nombre.trim()) return alert('Escribí el nombre de la receta');
      const ingredientes = Object.entries(checks)
        .filter(([,v]) => v !== undefined)
        .map(([ingId, cantidad]) => ({ ingId, cantidad: parseFloat(cantidad)||0 }));
      const datos = { nombre: nombre.trim(), emoji: emoji||'🍰', descripcion: desc, rinde, tipo, rinde_num: Number(rinde_num)||0, precioVenta: Number(precioVenta)||0, ingredientes };
      if (isEdit) saveRec(rec.map(r => r.id === modRec.id ? {...r,...datos} : r));
      else        saveRec([...rec, { id: uid2(), ...datos }]);
      setModRec(null);
    };

    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(44,18,6,0.52)', zIndex:200, display:'flex', alignItems:'flex-end' }}
        onClick={e => e.target === e.currentTarget && setModRec(null)}>
        <div style={{ background:'var(--superficie)', borderRadius:'20px 20px 0 0', padding:'24px 20px 44px', width:'100%', maxHeight:'92vh', overflowY:'auto' }}>
          <h2 style={{ fontFamily:'Playfair Display', fontSize:20, color:'var(--texto)', marginBottom:16 }}>
            {isEdit ? '✏️ Editar' : '📖 Nueva'} Receta
          </h2>
          <div style={{ display:'grid', gridTemplateColumns:'64px 1fr', gap:10 }}>
            <Campo label="Emoji" value={emoji} onChange={setEmoji} placeholder="🍰" />
            <Campo label="Nombre de la receta" value={nombre} onChange={setNombre} placeholder="Ej: Torta de vainilla" />
          </div>
          <Campo label="Descripción corta" value={desc} onChange={setDesc} placeholder="Ej: Con ganache de chocolate" />
          {/* Tipo de producto */}
          <div style={{ marginBottom:12 }}>
            <p style={{ fontSize:12, color:'var(--texto2)', marginBottom:6, fontWeight:600 }}>Tipo de producto</p>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 }}>
              {TIPOS_PRODUCTO.map(t => (
                <button key={t.id} onClick={()=>{ setTipo(t.id); if(!rinde_num) setRindeNum(t.porcionesDefault); setEmoji(t.label.split(' ')[0]); }}
                  style={{ padding:'7px 4px', borderRadius:9, border:tipo===t.id?'2px solid var(--caramelo)':'1px solid var(--beige)', background:tipo===t.id?'var(--beige)':'none', color:'var(--texto)', fontSize:11, cursor:'pointer', fontWeight:tipo===t.id?700:400 }}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
          <Campo label={getTipo(tipo).modo==='porcionable'?'¿Cuántas porciones salen de esta receta?':'¿Cuántas unidades salen de esta receta?'}
            value={rinde_num||''} onChange={v=>setRindeNum(Number(v))} tipo="number"
            placeholder={String(getTipo(tipo).porcionesDefault)} />
          <Campo label="Descripción del rendimiento (opcional)" value={rinde} onChange={setRinde} placeholder="Ej: 8 porciones generosas" />
          <Campo label="💰 Precio de venta ($) — se usa al cargar pedidos" value={precioVenta} onChange={setPrecioVenta} tipo="number" placeholder="Ej: 12000" />
          <label style={S.label}>✅ Ingredientes y cantidades</label>
          <div style={{ maxHeight:'32vh', overflowY:'auto', border:'1.5px solid var(--beige)', borderRadius:10, padding:'4px 12px', marginBottom:6 }}>
            {ing.map(item => {
              const sel = checks[item.id] !== undefined;
              const hint= RC_UNIT_HINT[item.unidad]||'';
              return (
                <div key={item.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 0', borderBottom:'1px solid var(--beige)' }}>
                  <input type="checkbox" checked={sel} onChange={() => toggleIng(item.id)}
                    style={{ width:18, height:18, accentColor:'var(--caramelo)', flexShrink:0 }} />
                  <label onClick={() => toggleIng(item.id)} style={{ flex:1, fontSize:13, cursor:'pointer' }}>{item.nombre}</label>
                  <input type="number" min="0" value={sel ? (checks[item.id]||'') : ''} disabled={!sel}
                    onChange={e => setQty(item.id, e.target.value)} placeholder="0"
                    style={{ width:70, padding:'5px 8px', border:'1.5px solid var(--beige)', borderRadius:8, fontSize:13, textAlign:'center', background:'var(--crema)', opacity: sel?1:.35 }} />
                  <span style={{ fontSize:11, color:'var(--texto2)', width:22 }}>{hint}</span>
                </div>
              );
            })}
          </div>
          {/* Botón para agregar ingrediente nuevo desde el formulario */}
          <AgregarIngredienteRapido
            ing={ing} saveIng={saveIng} uid2={uid2}
            onAgregado={(nuevoIng) => setChecks(prev => ({...prev, [nuevoIng.id]: ''}))}
          />
          <div style={{ display:'flex', gap:10, marginTop:14 }}>
            <button onClick={() => setModRec(null)} style={{ ...S.btnSecundario, flex:1, padding:13 }}>Cancelar</button>
            <button onClick={guardar} style={{ ...S.btnPrimario, flex:2, padding:13 }}>💾 Guardar receta</button>
          </div>
        </div>
      </div>
    );
  };

  // ── IMPORTAR EXCEL ───────────────────────────────

  return (
    <div>
      {/* Sub-pestañas Recetas / Stock */}
      <SubTab />
      {subTab === 'recetas'        && <TabRecetas />}
      {subTab === 'stock'          && <TabStock />}
      {subTab === 'calcular'       && <TabCalcular />}
      {modIngr !== null && <ModalIngr />}
      {verRec   !== null && <ModalVerRec />}
      {modRec   !== null && <ModalEditRec />}
    </div>
  );
}

function PantallaResumen({ uid, ingBase, recBase }) {
  const [periodo, setPeriodo] = useState('hoy');
  const [pedidos, setPedidos] = useState([]);
  const [planItems, setPlanItems] = useState([]);
  const [cargando, setCargando] = useState(true);

  const hoy = new Date().toISOString().slice(0,10);
  const semanaAtras = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const mesActual   = hoy.slice(0,7);

  useEffect(() => {
    const u = db.collection(`reposteria/${uid}/pedidos`)
      .orderBy('fecha','desc').limit(200)
      .onSnapshot(snap => {
        setPedidos(snap.docs.map(d=>({id:d.id,...d.data()})));
        setCargando(false);
      });
    // Planificación de hoy para calcular costo
    db.collection(`reposteria/${uid}/planificacion`).doc(hoy)
      .get().then(snap => { if(snap.exists) setPlanItems(snap.data().items||[]); });
    return u;
  }, [uid]);

  // ── Filtrar pedidos por período ────────────────────────────────────
  const filtrar = (p) => {
    if (periodo==='hoy')    return p.fecha === hoy;
    if (periodo==='semana') return p.fecha >= semanaAtras;
    if (periodo==='mes')    return p.fecha?.slice(0,7) === mesActual;
    return true;
  };
  const pedidosFiltrados = pedidos.filter(filtrar);

  // ── Calcular totales de ventas ─────────────────────────────────────
  const pedidosVenta   = pedidosFiltrados.filter(p=>p.tipo!=='perdida');
  const pedidosPerdida = pedidosFiltrados.filter(p=>p.tipo==='perdida');
  const totalVentas    = pedidosVenta.reduce((s,p)=>s+(Number(p.total)||0),0);
  const totalPerdidas  = pedidosPerdida.reduce((s,p)=>s+(Number(p.perdida)||0),0);
  const porPago = { efectivo:0, transferencia:0, debito:0, credito:0 };
  const transferenciasPend = [];
  pedidosFiltrados.forEach(p => {
    const monto = Number(p.total)||0;
    const pago = p.pago||'efectivo';
    if (pago==='transferencia') {
      if (p.confirmado) { porPago.transferencia += monto; }
      else { transferenciasPend.push(p); }
    } else {
      porPago[pago] = (porPago[pago]||0) + monto;
    }
  });
  const transferConfirmada  = porPago.transferencia;
  const transferPendiente   = transferenciasPend.reduce((s,p)=>s+(Number(p.total)||0),0);

  // ── Calcular costo de producción (desde planificación del día) ─────
  const calcCosto = () => {
    let total = 0;
    for (const item of planItems) {
      const rec = (recBase||[]).find(r=>r.id===item.recetaId);
      if (!rec) continue;
      for (const ri of (rec.ingredientes||[])) {
        const ing = (ingBase||[]).find(i=>i.id===ri.ingId);
        if (!ing || !ing.precio) continue;
        // cantidad en gramos/ml/unidades → convertir a unidad de compra
        const precioXUnidad = ing.precio;
        // Convertir cantidad base de receta a unidad de compra para calcular costo
        const CONV_R = { kg:1000, litro:1000, docena:12, unidad:1 };
        const cantXUnidad = ri.cantidad / (CONV_R[ing.unidad]||1);
        total += precioXUnidad * cantXUnidad * item.cantidad;
      }
    }
    return Math.round(total);
  };
  const costoProd   = periodo==='hoy' ? calcCosto() : 0;
  const ganancia    = totalVentas - costoProd;
  const margenPct   = totalVentas > 0 ? Math.round((ganancia/totalVentas)*100) : 0;

  // ── Por producto ───────────────────────────────────────────────────
  const porProducto = {};
  pedidosFiltrados.forEach(p => {
    (p.items||[]).forEach(it => {
      const k = it.nombre||'Sin nombre';
      if (!porProducto[k]) porProducto[k] = { nombre:k, cantidad:0, total:0 };
      porProducto[k].cantidad += Number(it.cantidad)||1;
      porProducto[k].total    += Number(it.subtotal)||Number(it.precio)||0;
    });
  });
  const rankProductos = Object.values(porProducto).sort((a,b)=>b.total-a.total);

  // ── Confirmar transferencia ────────────────────────────────────────
  const confirmarTransfer = async (id) => {
    await db.collection(`reposteria/${uid}/pedidos`).doc(id).update({ confirmado: true });
  };

  const fmt = (n) => '$'+Math.round(n).toLocaleString('es-AR');
  const PERIODOS = [['hoy','Hoy'],['semana','7 días'],['mes','Este mes']];
  const pagoLabel = { efectivo:'💵 Efectivo', debito:'💳 Débito', credito:'💳 Crédito' };

  return (
    <div style={{paddingBottom:80}}>
      {/* Resumen financiero */}

      {/* Selector período */}
      <div style={{display:'flex',background:'var(--beige)',borderRadius:12,margin:'10px 16px 0',padding:4,gap:4}}>
        {PERIODOS.map(([k,l])=>(
          <button key={k} onClick={()=>setPeriodo(k)} style={{flex:1,border:'none',cursor:'pointer',borderRadius:9,padding:'8px 4px',background:periodo===k?'var(--chocolate)':'transparent',color:periodo===k?'var(--barTxt)':'var(--texto2)',fontWeight:periodo===k?700:500,fontSize:13,transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>

      {cargando && <p style={{textAlign:'center',padding:40,color:'var(--texto2)'}}>Cargando...</p>}

      {!cargando && (
        <div style={{padding:'12px 16px'}}>

          {pedidosFiltrados.length===0 && (
            <div style={{textAlign:'center',padding:'40px 0',color:'var(--texto2)'}}>
              <div style={{fontSize:40,marginBottom:8}}>📭</div>
              <p>Sin ventas en este período</p>
            </div>
          )}

          {pedidosFiltrados.length>0 && <>

            {/* ── Cards resumen ── */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ventas</div>
                <div style={{fontSize:22,fontWeight:700,color:'var(--texto)'}}>{fmt(totalVentas)}</div>
                <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>{pedidosFiltrados.length} pedido{pedidosFiltrados.length!==1?'s':''}</div>
              </div>
              {periodo==='hoy' && (
                <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                  <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Costo producción</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--cacao)'}}>{fmt(costoProd)}</div>
                  <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>materia prima</div>
                </div>
              )}
              {periodo==='hoy' && (
                <div style={{background: ganancia>=0?'rgba(39,174,96,0.08)':'rgba(192,57,43,0.06)',border:`1px solid ${ganancia>=0?'rgba(39,174,96,0.3)':'rgba(192,57,43,0.3)'}`,borderRadius:12,padding:'12px 14px'}}>
                  <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ganancia</div>
                  <div style={{fontSize:22,fontWeight:700,color:ganancia>=0?'var(--verde)':'var(--rojo)'}}>{fmt(ganancia)}</div>
                  <div style={{fontSize:11,color:ganancia>=0?'var(--verde)':'var(--rojo)',marginTop:2,fontWeight:600}}>{margenPct}% de margen</div>
                </div>
              )}
              <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ticket promedio</div>
                <div style={{fontSize:22,fontWeight:700,color:'var(--texto)'}}>{fmt(pedidosVenta.length?totalVentas/pedidosVenta.length:0)}</div>
                <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>por pedido</div>
              </div>
              {totalPerdidas > 0 && (
                <div style={{background:'rgba(192,57,43,0.06)',border:'1px solid rgba(192,57,43,0.2)',borderRadius:12,padding:'12px 14px',gridColumn:'span 2'}}>
                  <div style={{fontSize:11,color:'var(--rojo)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>⚠️ Pérdidas por sobrantes</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--rojo)'}}>{fmt(totalPerdidas)}</div>
                  <div style={{fontSize:11,color:'var(--rojo)',marginTop:2}}>productos no vendidos</div>
                </div>
              )}
            </div>

            {/* ── Formas de pago ── */}
            <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Formas de pago</p>
            <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,overflow:'hidden',marginBottom:16}}>
              {Object.entries(pagoLabel).map(([k,l])=> porPago[k]>0 && (
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid var(--beige)'}}>
                  <span style={{fontSize:13,color:'var(--texto)'}}>{l}</span>
                  <span style={{fontSize:14,fontWeight:700,color:'var(--texto)'}}>{fmt(porPago[k])}</span>
                </div>
              ))}
              {(transferConfirmada>0||transferPendiente>0) && (
                <div style={{padding:'10px 14px',borderBottom:'1px solid var(--beige)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom: transferPendiente>0?6:0}}>
                    <span style={{fontSize:13,color:'var(--texto)'}}>📱 Transferencia confirmada</span>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--verde)'}}>{fmt(transferConfirmada)}</span>
                  </div>
                  {transferPendiente>0 && (
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:13,color:'var(--naranja)'}}>⏳ Transferencia pendiente</span>
                      <span style={{fontSize:14,fontWeight:700,color:'var(--naranja)'}}>{fmt(transferPendiente)}</span>
                    </div>
                  )}
                </div>
              )}
              <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'var(--beige)'}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--texto)'}}>Total cobrado</span>
                <span style={{fontSize:14,fontWeight:700,color:'var(--texto)'}}>{fmt(totalVentas-transferPendiente)}</span>
              </div>
            </div>

            {/* ── Transferencias pendientes de confirmar ── */}
            {transferenciasPend.length>0 && (
              <>
                <p style={{fontSize:11,fontWeight:700,color:'var(--naranja)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>⏳ Transferencias por confirmar</p>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {transferenciasPend.map(p=>(
                    <div key={p.id} style={{background:'rgba(230,126,34,0.07)',border:'1px solid rgba(230,126,34,0.3)',borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:'var(--texto)'}}>{p.fecha} {p.hora&&`· ${p.hora}`}</div>
                        <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>{(p.items||[]).map(i=>i.nombre).join(', ').slice(0,50)}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
                        <span style={{fontSize:14,fontWeight:700,color:'var(--naranja)'}}>{fmt(p.total)}</span>
                        <button onClick={()=>confirmarTransfer(p.id)} style={{background:'var(--verde)',color:'white',border:'none',borderRadius:8,padding:'4px 10px',cursor:'pointer',fontSize:12,fontWeight:600}}>✓ Confirmar</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* ── Por producto ── */}
            {rankProductos.length>0 && (
              <>
                <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Por producto</p>
                <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,overflow:'hidden',marginBottom:16}}>
                  {rankProductos.map((p,idx)=>(
                    <div key={p.nombre} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',borderBottom:idx<rankProductos.length-1?'1px solid var(--beige)':'none'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--texto)'}}>{p.nombre}</div>
                        <div style={{fontSize:11,color:'var(--texto2)'}}>{p.cantidad} unidad{p.cantidad!==1?'es':''}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--texto)'}}>{fmt(p.total)}</div>
                        <div style={{fontSize:10,color:'var(--texto2)'}}>{totalVentas>0?Math.round(p.total/totalVentas*100):0}% del total</div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

          </>}
        </div>
      )}
    </div>
  );
}
