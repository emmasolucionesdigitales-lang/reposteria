// ══════════════════════════════════════════════════════════════════════
// PANTALLA: PLANIFICACIÓN DE VENTA
// Planilla diaria basada en recetas → genera los productos del día
// ══════════════════════════════════════════════════════════════════════
function PantallaPlanificacion({ uid, ingBase, recBase }) {
  const hoy = () => new Date().toISOString().slice(0,10);
  const [stock, setStock]         = useState([]);
  const [planItems, setPlanItems] = useState([]);
  const [guardado, setGuardado]   = useState(false);
  const [editOpciones, setEditOpciones] = useState(null); // recetaId en edición

  useEffect(() => {
    const u1 = db.collection(`reposteria/${uid}/stock`).orderBy('nombre','asc')
      .onSnapshot(snap => setStock(snap.docs.map(d=>({id:d.id,...d.data()}))));
    const u2 = db.collection(`reposteria/${uid}/planificacion`).doc(hoy())
      .onSnapshot(snap => { if(snap.exists) setPlanItems(snap.data().items||[]); });
    return () => { u1(); u2(); };
  }, [uid]);

  // ── Helpers ────────────────────────────────────────────────────────
  const getItem = (recId) => planItems.find(i=>i.recetaId===recId);

  const setCantidad = (rec, cant) => {
    cant = Math.max(0, cant);
    setPlanItems(prev => {
      const existe = prev.find(i=>i.recetaId===rec.id);
      if (existe) {
        if (cant === 0) return prev.filter(i=>i.recetaId!==rec.id);
        return prev.map(i=>i.recetaId===rec.id ? {...i, cantidad:cant} : i);
      }
      if (cant === 0) return prev;
      return [...prev, {
        recetaId: rec.id, recetaNombre: rec.nombre, recetaEmoji: rec.emoji||'🍰',
        cantidad: cant,
        opciones: [{ id:'o'+Date.now(), label:'Por unidad', precio:0 }]
      }];
    });
  };

  const guardarOpciones = (recId, opciones) => {
    setPlanItems(prev => prev.map(i=>i.recetaId===recId ? {...i, opciones} : i));
    setEditOpciones(null);
  };

  // ── Calcular ingredientes totales ──────────────────────────────────
  const calcIngredientes = () => {
    const tot = {};
    for (const item of planItems) {
      const rec = (recBase||[]).find(r=>r.id===item.recetaId);
      if (!rec) continue;
      for (const ri of (rec.ingredientes||[])) {
        tot[ri.ingId] = (tot[ri.ingId]||0) + ri.cantidad * item.cantidad;
      }
    }
    return tot;
  };
  const ingNecesarios = calcIngredientes();

  const getStockInfo = (ingId) => {
    const ing = (ingBase||[]).find(i=>i.id===ingId);
    if (!ing) return null;
    const stk = stock.find(s => s.nombre === ing.nombre);
    const disponible = stk ? Number(stk.cantidad)||0 : 0;
    return { ing, disponible };
  };

  const guardar = async () => {
    await db.collection(`reposteria/${uid}/planificacion`).doc(hoy())
      .set({ fecha: hoy(), items: planItems });
    setGuardado(true);
    setTimeout(() => setGuardado(false), 3000);
  };

  // ── Modal opciones de venta ────────────────────────────────────────
  if (editOpciones !== null) {
    const item = planItems.find(i=>i.recetaId===editOpciones);
    return <ModalOpciones item={item} onGuardar={ops=>guardarOpciones(editOpciones,ops)} onCancelar={()=>setEditOpciones(null)} />;
  }

  const hayPlan = planItems.length > 0;
  const hayAlerta = Object.entries(ingNecesarios).some(([ingId, cant]) => {
    const s = getStockInfo(ingId); if(!s) return false;
    const dispGr = s.ing.unidad==='kg' ? s.disponible*1000 : s.disponible;
    return cant > dispGr;
  });

  return (
    <div style={{ paddingBottom:80 }}>
      <Header titulo="📐 Planificación" subtitulo={new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'})} />

      <div style={{ padding:'12px 16px' }}>

        {/* ── Planilla de producción ── */}
        <p style={{ fontSize:11, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:10 }}>¿Qué vas a producir hoy?</p>

        <div style={{ background:'var(--superficie)', border:'1px solid var(--beige)', borderRadius:14, overflow:'hidden', marginBottom:16 }}>
          {/* Header tabla */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 90px 40px', gap:0, background:'var(--beige)', padding:'8px 14px', borderBottom:'1px solid var(--beige2)' }}>
            <span style={{ fontSize:11, fontWeight:700, color:'var(--texto2)' }}>RECETA</span>
            <span style={{ fontSize:11, fontWeight:700, color:'var(--texto2)', textAlign:'center' }}>CANTIDAD</span>
            <span style={{ fontSize:11, fontWeight:700, color:'var(--texto2)', textAlign:'center' }}>💰</span>
          </div>

          {(recBase||[]).length === 0 && (
            <div style={{ padding:'24px', textAlign:'center', color:'var(--texto2)', fontSize:14 }}>
              No hay recetas cargadas. Andá a Recetas y creá las primeras.
            </div>
          )}

          {(recBase||[]).map((rec, idx) => {
            const item = getItem(rec.id);
            const cant = item ? item.cantidad : 0;
            const tieneOpciones = item && item.opciones && item.opciones.some(o=>o.precio>0);
            return (
              <div key={rec.id} style={{ display:'grid', gridTemplateColumns:'1fr 90px 40px', gap:0, padding:'10px 14px', borderBottom: idx < recBase.length-1 ? '1px solid var(--beige)' : 'none', alignItems:'center', background: cant>0 ? 'rgba(160,98,42,0.05)' : 'transparent' }}>
                <div>
                  <span style={{ fontSize:14, fontWeight:cant>0?700:400, color:'var(--texto)' }}>{rec.emoji||'🍰'} {rec.nombre}</span>
                  {cant>0 && (
                    <div style={{ fontSize:11, color: tieneOpciones?'var(--verde)':'var(--naranja)', marginTop:2 }}>
                      {tieneOpciones ? '✅ Precios cargados' : '⚠️ Sin precios de venta'}
                    </div>
                  )}
                </div>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                  <button onClick={()=>setCantidad(rec, cant-1)} style={{ width:26, height:26, borderRadius:'50%', border:'1px solid var(--beige2)', background:'none', cursor:'pointer', color:'var(--texto)', fontSize:14 }}>-</button>
                  <span style={{ fontSize:15, fontWeight:700, color:cant>0?'var(--chocolate)':'var(--texto2)', minWidth:20, textAlign:'center' }}>{cant}</span>
                  <button onClick={()=>setCantidad(rec, cant+1)} style={{ width:26, height:26, borderRadius:'50%', background:cant>0?'var(--caramelo)':'none', border:'1px solid var(--beige2)', cursor:'pointer', color:cant>0?'white':'var(--texto)', fontSize:14 }}>+</button>
                </div>
                <div style={{ textAlign:'center' }}>
                  {cant>0 && (
                    <button onClick={()=>setEditOpciones(rec.id)} title="Definir precios de venta"
                      style={{ width:32, height:32, borderRadius:8, border:'1px solid var(--beige2)', background: tieneOpciones?'var(--verde)':'var(--beige)', color: tieneOpciones?'white':'var(--texto2)', cursor:'pointer', fontSize:14 }}>
                      💰
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* ── Resumen de ingredientes ── */}
        {hayPlan && Object.keys(ingNecesarios).length > 0 && (
          <div style={{ marginBottom:16 }}>
            <p style={{ fontSize:11, fontWeight:700, color:'var(--texto2)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8 }}>
              Ingredientes necesarios {hayAlerta && <span style={{ color:'var(--naranja)' }}>· ⚠️ Falta stock</span>}
            </p>
            <div style={{ background:'var(--superficie)', border:'1px solid var(--beige)', borderRadius:12, overflow:'hidden' }}>
              {Object.entries(ingNecesarios).map(([ingId, cant], idx, arr) => {
                const s = getStockInfo(ingId);
                if (!s) return null;
                const esKg = s.ing.unidad === 'kg';
                const dispGr = esKg ? s.disponible * 1000 : s.disponible;
                const falta = cant > dispGr;
                const cantLabel = esKg ? (cant>=1000?(cant/1000).toFixed(2)+' kg':cant+'g') : cant+' '+s.ing.unidad;
                const dispLabel = esKg ? s.disponible.toFixed(2)+' kg' : s.disponible+' '+s.ing.unidad;
                return (
                  <div key={ingId} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px', borderBottom: idx<arr.length-1?'1px solid var(--beige)':'none', background: falta?'rgba(230,126,34,0.06)':'transparent' }}>
                    <span style={{ fontSize:13, color:'var(--texto)', fontWeight:falta?600:400 }}>{s.ing.nombre}</span>
                    <div style={{ textAlign:'right' }}>
                      <span style={{ fontSize:13, fontWeight:600, color:falta?'var(--naranja)':'var(--verde)' }}>{cantLabel} {falta?'⚠️':'✅'}</span>
                      <div style={{ fontSize:10, color:'var(--texto2)' }}>Stock: {dispLabel}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {guardado && <div style={{ background:'#d4edda', color:'#155724', borderRadius:10, padding:'10px', textAlign:'center', marginBottom:12, fontSize:13 }}>✅ Planificación guardada — Productos actualizados</div>}

        <button onClick={guardar} disabled={!hayPlan}
          style={{ ...S.btnPrimario, width:'100%', opacity:hayPlan?1:0.4 }}>
          Guardar planificación del día
        </button>

      </div>
    </div>
  );
}

// ── Modal para definir opciones de venta de un producto planificado ──
function ModalOpciones({ item, onGuardar, onCancelar }) {
  const [opciones, setOpciones] = useState(
    item.opciones && item.opciones.length > 0
      ? item.opciones
      : [{ id:'o'+Date.now(), label:'Por unidad', precio:0 }]
  );
  const agregar = () => setOpciones(p=>[...p,{id:'o'+Date.now(),label:'',precio:0}]);
  const editar  = (id,k,v) => setOpciones(p=>p.map(o=>o.id===id?{...o,[k]:v}:o));
  const quitar  = (id) => setOpciones(p=>p.filter(o=>o.id!==id));

  return (
    <div style={{ paddingBottom:80 }}>
      <Header titulo={`💰 ${item.recetaEmoji} ${item.recetaNombre}`} onBack={onCancelar} />
      <div style={{ padding:'16px' }}>
        <p style={{ color:'var(--texto2)', fontSize:13, marginBottom:16 }}>Definí cómo vas a vender este producto hoy. Podés tener varias opciones (por porción, entero, promo docena, etc.)</p>
        {opciones.map((op,idx) => (
          <div key={op.id} style={{ display:'flex', gap:8, marginBottom:10, alignItems:'center' }}>
            <input value={op.label} onChange={e=>editar(op.id,'label',e.target.value)}
              placeholder="Ej: Por porción / Entera / Promo docena"
              style={{ flex:2, ...S.inp }} />
            <div style={{ display:'flex', alignItems:'center', border:'1px solid var(--beige)', borderRadius:10, overflow:'hidden', flex:1 }}>
              <span style={{ padding:'0 8px', color:'var(--texto2)', fontSize:13 }}>$</span>
              <input type="number" value={op.precio||''} onChange={e=>editar(op.id,'precio',Number(e.target.value))}
                placeholder="0" style={{ border:'none', outline:'none', padding:'10px 6px 10px 0', width:'100%', background:'var(--superficie)', color:'var(--texto)', fontSize:14 }} />
            </div>
            {opciones.length > 1 && (
              <button onClick={()=>quitar(op.id)} style={{ color:'var(--rojo)', background:'none', border:'none', cursor:'pointer', fontSize:18, padding:'0 4px' }}>✕</button>
            )}
          </div>
        ))}
        <button onClick={agregar} style={{ ...S.btn, width:'100%', marginBottom:16 }}>+ Agregar otra opción</button>
        <button onClick={()=>onGuardar(opciones)} style={{ ...S.btnPrimario, width:'100%' }}>Guardar precios</button>
      </div>
    </div>
  );
}

// PANTALLA: PRODUCTOS (venta diaria — viene de la planificación)
// ══════════════════════════════════════════════════════════════════════
function PantallaProductos({ uid }) {
  const hoy = () => new Date().toISOString().slice(0,10);
  const [planItems, setPlanItems] = useState(null);
  const [carrito,   setCarrito]   = useState([]);
  const [pago,      setPago]      = useState('efectivo');
  const [entrega,   setEntrega]   = useState('retira');
  const [confirmado,setConfirmado]= useState(false);

  useEffect(() => {
    return db.collection(`reposteria/${uid}/planificacion`).doc(hoy())
      .onSnapshot(snap => setPlanItems(snap.exists ? (snap.data().items||[]) : []));
  }, [uid]);

  const productosDelDia = (planItems||[]).filter(i => i.opciones && i.opciones.some(o=>o.precio>0));

  const agregar = (item, op) => {
    const key = `${item.recetaId}_${op.id}`;
    setCarrito(prev => {
      const e = prev.find(i=>i.key===key);
      if (e) return prev.map(i=>i.key===key?{...i,cantidad:i.cantidad+1}:i);
      return [...prev, { key, emoji:item.recetaEmoji, nombre:item.recetaNombre, opLabel:op.label, precio:op.precio, cantidad:1 }];
    });
  };

  const cambiar = (key, delta) => {
    setCarrito(prev => prev.map(i=>i.key===key?{...i,cantidad:Math.max(0,i.cantidad+delta)}:i).filter(i=>i.cantidad>0));
  };

  const total = carrito.reduce((s,i)=>s+i.precio*i.cantidad, 0);

  const confirmar = async () => {
    if (!carrito.length) return;
    await db.collection(`reposteria/${uid}/pedidos`).add({
      fecha: hoy(),
      hora: new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),
      tipo: 'mostrador',
      items: carrito.map(i=>({ nombre:`${i.emoji} ${i.nombre}`, opcion:i.opLabel, precio:i.precio, cantidad:i.cantidad, subtotal:i.precio*i.cantidad })),
      total, pago, entrega,
      confirmado: pago !== 'transferencia', // transferencias arrancan como pendientes
    });
    setCarrito([]);
    setConfirmado(true);
    setTimeout(()=>setConfirmado(false), 3000);
  };

  const PAGOS    = [['efectivo','💵 Efectivo'],['transferencia','📱 Transfer.'],['debito','💳 Débito'],['credito','💳 Crédito']];
  const ENTREGAS = [['retira','🏪 Retira'],['envio','🛵 Envío']];

  if (planItems === null) return <div style={{textAlign:'center',padding:40,color:'var(--texto2)'}}>Cargando...</div>;

  if (planItems.length === 0) return (
    <div style={{paddingBottom:80}}>
      <Header titulo="🧁 Productos" />
      <div style={{textAlign:'center',padding:'60px 24px'}}>
        <div style={{fontSize:48,marginBottom:12}}>📐</div>
        <p style={{fontWeight:600,color:'var(--texto)',marginBottom:8}}>No hay planificación para hoy</p>
        <p style={{color:'var(--texto2)',fontSize:14}}>Andá a Planificación, cargá lo que vas a producir hoy y guardá. Los productos aparecerán acá.</p>
      </div>
    </div>
  );

  if (productosDelDia.length === 0) return (
    <div style={{paddingBottom:80}}>
      <Header titulo="🧁 Productos" />
      <div style={{textAlign:'center',padding:'60px 24px'}}>
        <div style={{fontSize:48,marginBottom:12}}>💰</div>
        <p style={{fontWeight:600,color:'var(--texto)',marginBottom:8}}>Falta definir los precios</p>
        <p style={{color:'var(--texto2)',fontSize:14}}>En Planificación tocá el botón 💰 de cada producto para cargar los precios de venta.</p>
      </div>
    </div>
  );

  return (
    <div style={{paddingBottom:80}}>
      <Header titulo="🧁 Productos del día" />
      <div style={{display:'flex',flexDirection:'column',gap:0}}>

        {/* Lista productos */}
        <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
          {productosDelDia.map(item => (
            <div key={item.recetaId} className="card-base" style={{padding:'10px 12px',marginBottom:0}}>
              <div style={{fontWeight:600,fontSize:15,marginBottom:8,color:'var(--texto)'}}>{item.recetaEmoji} {item.recetaNombre}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {item.opciones.filter(o=>o.precio>0).map(op => (
                  <div key={op.id} style={{flex:'1 1 130px',background:'var(--crema)',border:'1px solid var(--beige)',borderRadius:10,padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:11,color:'var(--texto2)'}}>{op.label}</div>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--chocolate)'}}>${op.precio.toLocaleString('es-AR')}</div>
                    </div>
                    <button onClick={()=>agregar(item,op)} style={{width:30,height:30,borderRadius:'50%',background:'var(--caramelo)',color:'white',border:'none',fontSize:20,cursor:'pointer',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>

        {/* Carrito */}
        <div style={{margin:'0 16px 16px',background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:14,padding:14}}>
          <p style={{fontSize:12,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:10}}>🛒 Carrito</p>

          {carrito.length===0
            ? <p style={{color:'var(--texto2)',fontSize:13,textAlign:'center',padding:'8px 0'}}>Agregá productos para armar la venta</p>
            : <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
                {carrito.map(i=>(
                  <div key={i.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--crema)',borderRadius:8,padding:'7px 10px'}}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontSize:13,fontWeight:500,color:'var(--texto)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.emoji} {i.nombre} · {i.opLabel}</div>
                      <div style={{fontSize:11,color:'var(--texto2)'}}>${i.precio.toLocaleString('es-AR')} c/u</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
                      <button onClick={()=>cambiar(i.key,-1)} style={{width:22,height:22,borderRadius:'50%',border:'1px solid var(--beige2)',background:'none',cursor:'pointer',color:'var(--texto)',fontSize:14}}>-</button>
                      <span style={{fontSize:14,fontWeight:700,color:'var(--texto)',minWidth:20,textAlign:'center'}}>{i.cantidad}</span>
                      <button onClick={()=>cambiar(i.key,+1)} style={{width:22,height:22,borderRadius:'50%',border:'1px solid var(--beige2)',background:'none',cursor:'pointer',color:'var(--texto)',fontSize:14}}>+</button>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--chocolate)',minWidth:56,textAlign:'right'}}>${(i.precio*i.cantidad).toLocaleString('es-AR')}</span>
                    </div>
                  </div>
                ))}
              </div>
          }

          {/* Pago */}
          <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',marginBottom:6}}>Forma de pago</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:10}}>
            {PAGOS.map(([k,l])=>(
              <button key={k} onClick={()=>setPago(k)} style={{padding:'7px 4px',borderRadius:8,fontSize:12,fontWeight:pago===k?700:400,border:pago===k?'2px solid var(--caramelo)':'1px solid var(--beige)',background:pago===k?'var(--beige)':'none',color:'var(--texto)',cursor:'pointer'}}>{l}</button>
            ))}
          </div>

          {/* Entrega */}
          <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',marginBottom:6}}>Entrega</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:12}}>
            {ENTREGAS.map(([k,l])=>(
              <button key={k} onClick={()=>setEntrega(k)} style={{padding:'7px 4px',borderRadius:8,fontSize:12,fontWeight:entrega===k?700:400,border:entrega===k?'2px solid var(--caramelo)':'1px solid var(--beige)',background:entrega===k?'var(--beige)':'none',color:'var(--texto)',cursor:'pointer'}}>{l}</button>
            ))}
          </div>

          {/* Total */}
          <div style={{borderTop:'1px solid var(--beige)',paddingTop:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontSize:15,fontWeight:700,color:'var(--texto)'}}>Total</span>
              <span style={{fontSize:20,fontWeight:700,color:'var(--chocolate)'}}>${total.toLocaleString('es-AR')}</span>
            </div>
            {confirmado && <div style={{background:'#d4edda',color:'#155724',borderRadius:8,padding:'8px',textAlign:'center',fontSize:13,marginBottom:8}}>✅ Venta confirmada</div>}
            <button onClick={confirmar} disabled={!carrito.length} style={{...S.btnPrimario,width:'100%',opacity:carrito.length?1:0.5}}>✓ Confirmar venta</button>
          </div>
        </div>

      </div>
    </div>
  );
}

// PANTALLA: RESUMEN FINANCIERO
// Ventas · Costos · Ganancias · Formas de pago · Por producto
// ══════════════════════════════════════════════════════════════════════
function PantallaResumen({ uid, ingBase, recBase }) {
  const [periodo, setPeriodo] = useState('hoy');
  const [pedidos, setPedidos] = useState([]);
  const [planItems, setPlanItems] = useState([]);
  const [cargando, setCargando] = useState(true);

  const hoy = new Date().toISOString().slice(0,10);
  const semanaAtras = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const mesActual   = hoy.slice(0,7);

  useEffect(() => {
    const u = db.collection(`reposteria/${uid}/pedidos`)
      .orderBy('fecha','desc').limit(200)
      .onSnapshot(snap => {
        setPedidos(snap.docs.map(d=>({id:d.id,...d.data()})));
        setCargando(false);
      });
    // Planificación de hoy para calcular costo
    db.collection(`reposteria/${uid}/planificacion`).doc(hoy)
      .get().then(snap => { if(snap.exists) setPlanItems(snap.data().items||[]); });
    return u;
  }, [uid]);

  // ── Filtrar pedidos por período ────────────────────────────────────
  const filtrar = (p) => {
    if (periodo==='hoy')    return p.fecha === hoy;
    if (periodo==='semana') return p.fecha >= semanaAtras;
    if (periodo==='mes')    return p.fecha?.slice(0,7) === mesActual;
    return true;
  };
  const pedidosFiltrados = pedidos.filter(filtrar);

  // ── Calcular totales de ventas ─────────────────────────────────────
  const totalVentas    = pedidosFiltrados.reduce((s,p)=>s+(Number(p.total)||0),0);
  const porPago = { efectivo:0, transferencia:0, debito:0, credito:0 };
  const transferenciasPend = [];
  pedidosFiltrados.forEach(p => {
    const monto = Number(p.total)||0;
    const pago = p.pago||'efectivo';
    if (pago==='transferencia') {
      if (p.confirmado) { porPago.transferencia += monto; }
      else { transferenciasPend.push(p); }
    } else {
      porPago[pago] = (porPago[pago]||0) + monto;
    }
  });
  const transferConfirmada  = porPago.transferencia;
  const transferPendiente   = transferenciasPend.reduce((s,p)=>s+(Number(p.total)||0),0);

  // ── Calcular costo de producción (desde planificación del día) ─────
  const calcCosto = () => {
    let total = 0;
    for (const item of planItems) {
      const rec = (recBase||[]).find(r=>r.id===item.recetaId);
      if (!rec) continue;
      for (const ri of (rec.ingredientes||[])) {
        const ing = (ingBase||[]).find(i=>i.id===ri.ingId);
        if (!ing || !ing.precio) continue;
        // cantidad en gramos/ml/unidades → convertir a unidad de compra
        const precioXUnidad = ing.precio;
        const cantXUnidad = ing.unidad==='kg' ? ri.cantidad/1000 :
                            ing.unidad==='litro' ? ri.cantidad/1000 :
                            ri.cantidad;
        total += precioXUnidad * cantXUnidad * item.cantidad;
      }
    }
    return Math.round(total);
  };
  const costoProd   = periodo==='hoy' ? calcCosto() : 0;
  const ganancia    = totalVentas - costoProd;
  const margenPct   = totalVentas > 0 ? Math.round((ganancia/totalVentas)*100) : 0;

  // ── Por producto ───────────────────────────────────────────────────
  const porProducto = {};
  pedidosFiltrados.forEach(p => {
    (p.items||[]).forEach(it => {
      const k = it.nombre||'Sin nombre';
      if (!porProducto[k]) porProducto[k] = { nombre:k, cantidad:0, total:0 };
      porProducto[k].cantidad += Number(it.cantidad)||1;
      porProducto[k].total    += Number(it.subtotal)||Number(it.precio)||0;
    });
  });
  const rankProductos = Object.values(porProducto).sort((a,b)=>b.total-a.total);

  // ── Confirmar transferencia ────────────────────────────────────────
  const confirmarTransfer = async (id) => {
    await db.collection(`reposteria/${uid}/pedidos`).doc(id).update({ confirmado: true });
  };

  const fmt = (n) => '$'+Math.round(n).toLocaleString('es-AR');
  const PERIODOS = [['hoy','Hoy'],['semana','7 días'],['mes','Este mes']];
  const pagoLabel = { efectivo:'💵 Efectivo', debito:'💳 Débito', credito:'💳 Crédito' };

  return (
    <div style={{paddingBottom:80}}>
      <Header titulo="📊 Resumen financiero" />

      {/* Selector período */}
      <div style={{display:'flex',background:'var(--beige)',borderRadius:12,margin:'10px 16px 0',padding:4,gap:4}}>
        {PERIODOS.map(([k,l])=>(
          <button key={k} onClick={()=>setPeriodo(k)} style={{flex:1,border:'none',cursor:'pointer',borderRadius:9,padding:'8px 4px',background:periodo===k?'var(--chocolate)':'transparent',color:periodo===k?'var(--crema)':'var(--texto2)',fontWeight:periodo===k?700:500,fontSize:13,transition:'all .15s'}}>
            {l}
          </button>
        ))}
      </div>

      {cargando && <p style={{textAlign:'center',padding:40,color:'var(--texto2)'}}>Cargando...</p>}

      {!cargando && (
        <div style={{padding:'12px 16px'}}>

          {pedidosFiltrados.length===0 && (
            <div style={{textAlign:'center',padding:'40px 0',color:'var(--texto2)'}}>
              <div style={{fontSize:40,marginBottom:8}}>📭</div>
              <p>Sin ventas en este período</p>
            </div>
          )}

          {pedidosFiltrados.length>0 && <>

            {/* ── Cards resumen ── */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ventas</div>
                <div style={{fontSize:22,fontWeight:700,color:'var(--chocolate)'}}>{fmt(totalVentas)}</div>
                <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>{pedidosFiltrados.length} pedido{pedidosFiltrados.length!==1?'s':''}</div>
              </div>
              {periodo==='hoy' && (
                <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                  <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Costo producción</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--cacao)'}}>{fmt(costoProd)}</div>
                  <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>materia prima</div>
                </div>
              )}
              {periodo==='hoy' && (
                <div style={{background: ganancia>=0?'rgba(39,174,96,0.08)':'rgba(192,57,43,0.06)',border:`1px solid ${ganancia>=0?'rgba(39,174,96,0.3)':'rgba(192,57,43,0.3)'}`,borderRadius:12,padding:'12px 14px'}}>
                  <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ganancia</div>
                  <div style={{fontSize:22,fontWeight:700,color:ganancia>=0?'var(--verde)':'var(--rojo)'}}>{fmt(ganancia)}</div>
                  <div style={{fontSize:11,color:ganancia>=0?'var(--verde)':'var(--rojo)',marginTop:2,fontWeight:600}}>{margenPct}% de margen</div>
                </div>
              )}
              <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--texto2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:4}}>Ticket promedio</div>
                <div style={{fontSize:22,fontWeight:700,color:'var(--chocolate)'}}>{fmt(pedidosFiltrados.length?totalVentas/pedidosFiltrados.length:0)}</div>
                <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>por pedido</div>
              </div>
            </div>

            {/* ── Formas de pago ── */}
            <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Formas de pago</p>
            <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,overflow:'hidden',marginBottom:16}}>
              {Object.entries(pagoLabel).map(([k,l])=> porPago[k]>0 && (
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid var(--beige)'}}>
                  <span style={{fontSize:13,color:'var(--texto)'}}>{l}</span>
                  <span style={{fontSize:14,fontWeight:700,color:'var(--chocolate)'}}>{fmt(porPago[k])}</span>
                </div>
              ))}
              {(transferConfirmada>0||transferPendiente>0) && (
                <div style={{padding:'10px 14px',borderBottom:'1px solid var(--beige)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom: transferPendiente>0?6:0}}>
                    <span style={{fontSize:13,color:'var(--texto)'}}>📱 Transferencia confirmada</span>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--verde)'}}>{fmt(transferConfirmada)}</span>
                  </div>
                  {transferPendiente>0 && (
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:13,color:'var(--naranja)'}}>⏳ Transferencia pendiente</span>
                      <span style={{fontSize:14,fontWeight:700,color:'var(--naranja)'}}>{fmt(transferPendiente)}</span>
                    </div>
                  )}
                </div>
              )}
              <div style={{display:'flex',justifyContent:'space-between',padding:'10px 14px',background:'var(--beige)'}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--texto)'}}>Total cobrado</span>
                <span style={{fontSize:14,fontWeight:700,color:'var(--chocolate)'}}>{fmt(totalVentas-transferPendiente)}</span>
              </div>
            </div>

            {/* ── Transferencias pendientes de confirmar ── */}
            {transferenciasPend.length>0 && (
              <>
                <p style={{fontSize:11,fontWeight:700,color:'var(--naranja)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>⏳ Transferencias por confirmar</p>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {transferenciasPend.map(p=>(
                    <div key={p.id} style={{background:'rgba(230,126,34,0.07)',border:'1px solid rgba(230,126,34,0.3)',borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:'var(--texto)'}}>{p.fecha} {p.hora&&`· ${p.hora}`}</div>
                        <div style={{fontSize:11,color:'var(--texto2)',marginTop:2}}>{(p.items||[]).map(i=>i.nombre).join(', ').slice(0,50)}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
                        <span style={{fontSize:14,fontWeight:700,color:'var(--naranja)'}}>{fmt(p.total)}</span>
                        <button onClick={()=>confirmarTransfer(p.id)} style={{background:'var(--verde)',color:'white',border:'none',borderRadius:8,padding:'4px 10px',cursor:'pointer',fontSize:12,fontWeight:600}}>✓ Confirmar</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* ── Por producto ── */}
            {rankProductos.length>0 && (
              <>
                <p style={{fontSize:11,fontWeight:700,color:'var(--texto2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Por producto</p>
                <div style={{background:'var(--superficie)',border:'1px solid var(--beige)',borderRadius:12,overflow:'hidden',marginBottom:16}}>
                  {rankProductos.map((p,idx)=>(
                    <div key={p.nombre} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',borderBottom:idx<rankProductos.length-1?'1px solid var(--beige)':'none'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--texto)'}}>{p.nombre}</div>
                        <div style={{fontSize:11,color:'var(--texto2)'}}>{p.cantidad} unidad{p.cantidad!==1?'es':''}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--chocolate)'}}>{fmt(p.total)}</div>
                        <div style={{fontSize:10,color:'var(--texto2)'}}>{totalVentas>0?Math.round(p.total/totalVentas*100):0}% del total</div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

          </>}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(undefined);
  const [tab, setTab]   = useState('productos');

  useEffect(() => {
    return auth.onAuthStateChanged(u => setUser(u));
  }, []);

  // Cargando estado inicial de auth
  if (user === undefined) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14 }}>
        <div style={{ fontSize: 56 }}>🍰</div>
        <p style={{ color: 'var(--texto2)', fontSize: 15 }}>Cargando Dulce Gestión...</p>
      </div>
    );
  }

  if (!user) return <Login />;

  const ingBase = ING_DEFAULT_RC;
  const recBase = REC_DEFAULT_RC;
  const pantallas = {
    productos:     <PantallaProductos    uid={user.uid} />,
    pedidos:       <PantallaPedidos      uid={user.uid} />,
    recetas:       <PantallaRecetas      uid={user.uid} />,
    resumen:       <PantallaResumen      uid={user.uid} ingBase={ingBase} recBase={recBase} />,
    planificacion: <PantallaPlanificacion uid={user.uid} ingBase={ingBase} recBase={recBase} />,
    ajustes:       <PantallaAjustes      onLogout={() => auth.signOut()} />,
  };

  return (
    <div style={{ paddingBottom: 72 }}>
      {pantallas[tab] || pantallas.pedidos}
      <BtnEscala/><BtnDark/><NavBar activo={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// ── SERVICE WORKER (PWA) ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swContent = [
      "const CACHE='dg-v1';",
      "self.addEventListener('install',e=>self.skipWaiting());",
      "self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!=='dg-v1').map(n=>caches.delete(n))))));",
      "self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>{const n=fetch(e.request).then(r=>{if(r.ok)caches.open('dg-v1').then(ca=>ca.put(e.request,r.clone()));return r;}).catch(()=>c);return c||n;}));});"
    ].join('\n');
    const blob = new Blob([swContent], {type:'text/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>
</body>
</html>
